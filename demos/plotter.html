<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plotter &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #f7f4ec;   /* bone white */
      --color-foreground: #1c1c1e;   /* india ink */
      --color-primary: #c4452c;      /* sanguine pen */
      --color-accent: #4a4a4e;
      --color-info: #3c6e8f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'IBM Plex Mono', monospace; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    plot-scrim { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 66% 62% at 50% 50%, transparent 34%, rgba(247,244,236,0.85) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.7; }
    nav a:hover { opacity: 1; }

    plot-content { display: block; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    plot-eyebrow { display: block; font-size: 13px; letter-spacing: 0.24em; color: var(--color-primary); opacity: 0.92; margin-bottom: 18px; text-transform: lowercase; }
    h1 { font-weight: 600; font-size: clamp(58px, 12vw, 200px); letter-spacing: 0.02em; line-height: 0.95; margin: 0; text-transform: uppercase; color: var(--color-foreground); }
    h1 em { font-style: normal; color: var(--color-primary); }
    plot-content p { max-width: 560px; margin: 24px auto 0; font-size: clamp(14px, 1.1vw, 17px); line-height: 1.6; color: rgba(28,28,30,0.8); }
    plot-content p code { font-size: 0.9em; background: rgba(28,28,30,0.07); padding: 2px 7px; border-radius: 4px; }

    plot-foot { display: flex; position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-size: 11px; letter-spacing: 0.18em; color: var(--color-primary); opacity: 0.85; flex-wrap: wrap; gap: 12px; }
    plot-stat { display: block; }
    plot-stat span { color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="plotter" data-background-intensity="0.7" data-background-density="0.55" data-background-speed="0.8">
    <plot-scrim></plot-scrim>

    <plot-content>
      <plot-eyebrow>// pen on paper &middot; canvas2d</plot-eyebrow>
      <h1>Plot<em>ter</em></h1>
      <p>
        Watch the pen work: flow fields, hatched discs, and contour stacks drawn
        stroke by stroke, sheet after sheet. <code>preset="plotter"</code> &mdash;
        generative line art with the machine left visible.
      </p>
    </plot-content>

    <plot-foot>
      <plot-stat><span>preset</span>plotter</plot-stat>
      <plot-stat><span>render</span>canvas2d</plot-stat>
      <plot-stat><span>sheet</span>30s</plot-stat>
      <plot-stat><span>palette</span>theme</plot-stat>
    </plot-foot>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
