<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memphis &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #f4f0e8;
      --color-foreground: #1a1a1a;
      --color-primary: #ff3d6e;
      --color-accent: #ffd23f;
      --color-info: #2cc6e0;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100vh; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* Memphis ornaments */
    svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }

    memphis-content {
      display: flex; position: absolute; inset: 0; z-index: 5;
      flex-direction: column; justify-content: center;
      padding: 0 clamp(28px, 6vw, 100px);
    }
    memphis-eyebrow {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--color-primary);
      margin-bottom: 18px;
    }
    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(48px, 9vw, 152px);
      line-height: 0.86;
      letter-spacing: -0.035em;
      margin: 0;
      text-transform: uppercase;
      color: var(--color-foreground);
      max-width: 14ch;
    }
    memphis-word { display: inline; }
    memphis-word[data-tone="yellow"] { background: var(--color-accent); padding: 0 10px; box-shadow: 6px 6px 0 var(--color-foreground); }
    memphis-word[data-tone="pink"]   { color: var(--color-primary); -webkit-text-stroke: 3px var(--color-foreground); paint-order: stroke fill; text-shadow: 6px 6px 0 var(--color-foreground); }
    memphis-word[data-tone="cyan"]   { color: var(--color-info); }

    memphis-content p {
      font-size: clamp(15px, 1.2vw, 18px);
      line-height: 1.55;
      max-width: 460px;
      margin: 28px 0 0;
      font-weight: 500;
    }
    memphis-content p code { background: var(--color-foreground); color: var(--color-background); padding: 2px 8px; font-family: ui-monospace, monospace; font-size: 0.92em; }

    memphis-chip {
      display: block; position: absolute; top: 26px; right: 32px; z-index: 6;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
      background: var(--color-foreground); color: var(--color-background);
      padding: 6px 12px;
      box-shadow: 4px 4px 0 var(--color-primary);
    }

    nav { position: absolute; top: 26px; left: 32px; z-index: 6; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
    nav a { color: var(--color-foreground); text-decoration: none; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <memphis-chip>Memphis &middot; 09</memphis-chip>
  <main data-background="waves" data-background-intensity="0.7" data-background-density="0.35" data-background-speed="0.7">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <!-- Squiggle ribbon top-right -->
      <path d="M 1100,80 Q 1180,40 1240,90 T 1380,110 T 1520,90 T 1660,140"
            stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Big black triangle bottom-left -->
      <polygon points="60,820 220,600 280,860" fill="#1a1a1a"/>
      <!-- Yellow stripe wedge -->
      <polygon points="1200,820 1380,820 1280,640" fill="#ffd23f" stroke="#1a1a1a" stroke-width="4"/>
      <!-- Pink circle, outlined -->
      <circle cx="180" cy="200" r="44" fill="#ff3d6e" stroke="#1a1a1a" stroke-width="5"/>
      <!-- Cyan ring -->
      <circle cx="1450" cy="500" r="48" fill="none" stroke="#2cc6e0" stroke-width="9"/>
      <!-- Black dot pattern, scattered -->
      <g fill="#1a1a1a">
        <circle cx="420" cy="160" r="6"/>
        <circle cx="450" cy="170" r="6"/>
        <circle cx="480" cy="160" r="6"/>
        <circle cx="510" cy="180" r="6"/>
        <circle cx="540" cy="170" r="6"/>
        <circle cx="980" cy="780" r="6"/>
        <circle cx="1010" cy="800" r="6"/>
        <circle cx="1040" cy="790" r="6"/>
        <circle cx="1070" cy="810" r="6"/>
      </g>
      <!-- Slashes / hatching -->
      <g stroke="#1a1a1a" stroke-width="6" stroke-linecap="round">
        <line x1="100" y1="500" x2="170" y2="430"/>
        <line x1="80"  y1="540" x2="150" y2="470"/>
        <line x1="60"  y1="580" x2="130" y2="510"/>
      </g>
      <!-- Yellow squiggly squiggle -->
      <path d="M 740,720 Q 800,640 860,720 T 980,720 T 1100,720"
            stroke="#ffd23f" stroke-width="14" fill="none" stroke-linecap="round"/>
      <path d="M 740,720 Q 800,640 860,720 T 980,720 T 1100,720"
            stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Outlined zigzag -->
      <polyline points="1320,260 1360,300 1320,340 1360,380 1320,420"
                fill="none" stroke="#1a1a1a" stroke-width="5"/>
      <!-- Cross / plus -->
      <g stroke="#ff3d6e" stroke-width="8" stroke-linecap="round">
        <line x1="1340" y1="700" x2="1400" y2="700"/>
        <line x1="1370" y1="670" x2="1370" y2="730"/>
      </g>
    </svg>

    <memphis-content>
      <memphis-eyebrow>// Postmodern.Web &middot; 1981 / 2026</memphis-eyebrow>
      <h1>Memphis<br><memphis-word data-tone="yellow">never</memphis-word><br><memphis-word data-tone="pink">left.</memphis-word></h1>
      <p>
        <code>preset="waves"</code> does the bold horizontal bands; the rest is squiggles, dots,
        and a yellow stripe wedge in SVG. Sottsass would approve.
      </p>
    </memphis-content>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
