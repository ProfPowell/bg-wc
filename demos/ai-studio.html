<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Studio &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0a0a12;
      --color-foreground: #eef0f8;
      --color-primary: #7c6cff;
      --color-accent: #18d2c4;
      --color-info: #ff6fae;
      --panel: rgba(16,16,26,0.72);
      --border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #06060c; color: var(--color-foreground); overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    main { position: relative; display: grid; width: 100vw; height: 100vh; }
    /* Two full-bleed data-background hosts stack via the CSS grid single-cell
       trick: both occupy grid-area 1/1, z-index sets their order. */
    studio-backdrop { display: block; grid-area: 1 / 1; z-index: 0; }
    studio-backdrop#bg-backdrop > bg-wc[data-bg-element] { transition: opacity 0.35s ease; }
    studio-backdrop[data-layer="grain"] { z-index: 2; pointer-events: none; mix-blend-mode: soft-light; opacity: 0.5; }
    studio-veil { display: block; position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, transparent 0%, rgba(6,6,12,0.55) 95%); }

    header { position: absolute; top: 0; left: 0; right: 0; z-index: 6;
      display: flex; justify-content: space-between; align-items: center; padding: 18px 28px; }
    studio-brand { display: flex; font-weight: 700; letter-spacing: -0.01em; align-items: center; gap: 10px; }
    studio-brand studio-mark { display: block; width: 22px; height: 22px; border-radius: 7px; background: conic-gradient(from 0deg, var(--color-primary), var(--color-accent), var(--color-info), var(--color-primary)); }
    header a { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13px; }
    header a:hover { color: #fff; }

    studio-center { display: flex; position: absolute; inset: 0; z-index: 5; flex-direction: column; align-items: center; justify-content: center; padding: 0 6vw; text-align: center; gap: 22px; }
    result-chip {
      display: inline-flex; font-size: 12px; letter-spacing: 0.04em; color: rgba(255,255,255,0.7);
      background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
      padding: 6px 14px; backdrop-filter: blur(10px);
      align-items: center; gap: 8px;
    }
    result-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--color-accent); box-shadow: 0 0 8px var(--color-accent); }
    result-chip code { font-family: ui-monospace, monospace; color: var(--color-accent); }

    h1 { font-size: clamp(30px, 5vw, 64px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; margin: 0; max-width: 18ch;
      background: linear-gradient(100deg, #fff, var(--color-accent) 55%, var(--color-info)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* prompt bar */
    studio-prompt {
      display: flex; position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); z-index: 6;
      width: min(680px, 90vw);
      background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px 16px; backdrop-filter: blur(14px);
      align-items: center; gap: 12px;
      box-shadow: 0 18px 50px -16px rgba(0,0,0,0.7);
    }
    studio-prompt studio-mark { display: block; width: 26px; height: 26px; border-radius: 8px; flex: none;
      background: conic-gradient(from 0deg, var(--color-primary), var(--color-accent), var(--color-info), var(--color-primary));
      animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce){ studio-prompt studio-mark { animation: none; } }
    prompt-text { display: block; flex: 1; text-align: left; font-size: clamp(14px,1.4vw,17px); color: #fff; min-height: 1.3em; }
    prompt-text prompt-caret { display: inline-block; width: 2px; height: 1.1em; background: var(--color-accent); vertical-align: -2px; margin-left: 1px; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    studio-status { display: flex; flex: none; font-size: 12px; color: var(--color-accent); align-items: center; gap: 7px; min-width: 92px; justify-content: flex-end; }
    studio-status status-ring { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--color-accent); border-top-color: transparent; animation: spin 0.7s linear infinite; }
    studio-status[data-state="done"] status-ring { border: 2px solid var(--color-accent); animation: none; }
  </style>
</head>
<body>
  <main>
    <studio-backdrop id="bg-backdrop" data-background="mesh-gradient" data-background-intensity="0.6" data-background-speed="0.5"></studio-backdrop>
    <studio-veil></studio-veil>

    <header>
      <studio-brand><studio-mark></studio-mark> bg-wc&nbsp;studio</studio-brand>
      <a href="./" target="_top">&larr; Demos</a>
    </header>

    <studio-center>
      <result-chip><result-dot></result-dot> bg-wc-diffusion v1 &middot; <code id="chipPreset">mesh-gradient</code></result-chip>
      <h1 id="headline">Describe a background. Watch it render.</h1>
    </studio-center>

    <studio-prompt>
      <studio-mark></studio-mark>
      <prompt-text><span id="promptText"></span><prompt-caret></prompt-caret></prompt-text>
      <studio-status id="status"><status-ring></status-ring><span id="statusLabel">ready</span></studio-status>
    </studio-prompt>

    <studio-backdrop data-layer="grain" data-background="grain" data-background-intensity="0.45" data-background-density="0.7"></studio-backdrop>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';

    // A faux "prompt → background" generator: type a prompt, show a spinner,
    // then live-swap the bg-wc preset. bg-wc's runtime preset hot-swap +
    // theme-token reads make each "generation" instant and dependency-free.
    // The data-background binder already injected the real bg-wc element as
    // the first child of #bg-backdrop; grab that live instance to drive directly.
    const bgHost = document.getElementById('bg-backdrop');
    const bg = bgHost.querySelector(':scope > bg-wc[data-bg-element]');
    const promptText = document.getElementById('promptText');
    const status = document.getElementById('status');
    const statusLabel = document.getElementById('statusLabel');
    const chipPreset = document.getElementById('chipPreset');
    const headline = document.getElementById('headline');

    const JOBS = [
      { p: 'an aurora over arctic mountains at 2am',        preset: 'aurora',     attrs: { intensity: 0.85, density: 0.45, speed: 0.4 }, tokens: { '--color-primary':'#4dffa1','--color-accent':'#5ec8ff','--color-info':'#ff5fc8','--color-background':'#04060e' } },
      { p: 'a busy trading terminal, green and red',        preset: 'trades',     attrs: { density: 0.6, speed: 1 },     tokens: { '--color-primary':'#26d07c','--color-accent':'#ff4d6d','--color-foreground':'#d7e6ff','--color-background':'#05080f' } },
      { p: 'a calm pastel marble, mallsoft mood',           preset: 'marble',     attrs: { intensity: 0.5, density: 0.4, speed: 0.5 }, tokens: { '--color-primary':'#ffd6ec','--color-accent':'#bfe6f0','--color-background':'#f6e7f2','--color-foreground':'#6a5a72' } },
      { p: 'demoscene plasma, loud and electric',           preset: 'plasma',     attrs: { intensity: 0.8, density: 0.55, speed: 1.4 }, tokens: { '--color-primary':'#ff2bd6','--color-accent':'#2bd4ff','--color-info':'#ffe23a','--color-background':'#050208' } },
      { p: 'a word cloud about machine learning',           preset: 'wordcloud',  attrs: { speed: 1 },                  text: 'neural|tensor|gradient|prompt|token|latent|diffusion|transformer|vector|model|inference|embedding|attention|weights|sample', tokens: { '--color-primary':'#7c6cff','--color-accent':'#18d2c4','--color-info':'#ff6fae','--color-background':'#0a0a14' } },
      { p: 'a movement map of global traffic',              preset: 'vectormap',  attrs: { density: 0.6, speed: 0.6 },   tokens: { '--color-primary':'#5b8eff','--color-accent':'#ffb000','--color-info':'#25d0a6','--color-background':'#04101c' } },
      { p: 'a Stripe-style hero gradient',                  preset: 'mesh-gradient', attrs: { intensity: 0.7, speed: 0.45 }, tokens: { '--color-primary':'#635bff','--color-accent':'#00d4ff','--color-info':'#ff5996','--color-background':'#0a2540' } },
    ];

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function typeOut(str) {
      promptText.textContent = '';
      for (let i = 0; i < str.length; i++) { promptText.textContent += str[i]; await sleep(22 + Math.random() * 30); }
    }

    function applyTokens(tokens) {
      // Clear any previously-set per-instance tokens, then apply the job's.
      for (const k of ['--color-primary','--color-accent','--color-info','--color-background','--color-foreground']) bg.style.removeProperty(k);
      for (const [k, v] of Object.entries(tokens || {})) bg.style.setProperty(k, v);
    }

    async function run() {
      let i = 0;
      // initial tokens for the opening mesh-gradient
      applyTokens(JOBS[6].tokens);
      while (true) {
        const job = JOBS[i % JOBS.length];
        // type the prompt
        status.removeAttribute('data-state'); statusLabel.textContent = 'ready';
        await typeOut(job.p);
        // generating
        statusLabel.textContent = 'generating';
        bg.style.opacity = '0.35';
        await sleep(900);
        // apply the "result"
        applyTokens(job.tokens);
        if (job.text != null) bg.setAttribute('text', job.text); else bg.removeAttribute('text');
        for (const [k, v] of Object.entries(job.attrs || {})) bg.setAttribute(k, String(v));
        bg.setAttribute('preset', job.preset);
        await bg.ready;
        bg.style.opacity = '1';
        chipPreset.textContent = job.preset;
        status.setAttribute('data-state', 'done'); statusLabel.textContent = 'done';
        headline.textContent = '“' + job.p + '”';
        await sleep(3600);
        i++;
      }
    }
    run();
  </script>
</body>
</html>
