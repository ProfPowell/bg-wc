<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Studio &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0a0a12;
      --color-foreground: #eef0f8;
      --color-primary: #7c6cff;
      --color-accent: #18d2c4;
      --color-info: #ff6fae;
      --panel: rgba(16,16,26,0.72);
      --border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #06060c; color: var(--color-foreground); overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .stage { position: relative; width: 100vw; height: 100vh; }
    #bg { position: absolute; inset: 0; z-index: 0; transition: opacity 0.35s ease; }
    .veil { position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, transparent 0%, rgba(6,6,12,0.55) 95%); }
    .grain { position: absolute; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: soft-light; opacity: 0.5; }

    .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 6;
      display: flex; justify-content: space-between; align-items: center; padding: 18px 28px; }
    .brand { font-weight: 700; letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; }
    .brand .spark { width: 22px; height: 22px; border-radius: 7px; background: conic-gradient(from 0deg, var(--color-primary), var(--color-accent), var(--color-info), var(--color-primary)); }
    .topbar a { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13px; }
    .topbar a:hover { color: #fff; }

    .center { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 6vw; text-align: center; gap: 22px; }
    .result-chip {
      font-size: 12px; letter-spacing: 0.04em; color: rgba(255,255,255,0.7);
      background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
      padding: 6px 14px; backdrop-filter: blur(10px);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .result-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-accent); box-shadow: 0 0 8px var(--color-accent); }
    .result-chip code { font-family: ui-monospace, monospace; color: var(--color-accent); }

    h1 { font-size: clamp(30px, 5vw, 64px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.05; margin: 0; max-width: 18ch;
      background: linear-gradient(100deg, #fff, var(--color-accent) 55%, var(--color-info)); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* prompt bar */
    .prompt {
      position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); z-index: 6;
      width: min(680px, 90vw);
      background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px 16px; backdrop-filter: blur(14px);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 18px 50px -16px rgba(0,0,0,0.7);
    }
    .prompt .spark { width: 26px; height: 26px; border-radius: 8px; flex: none;
      background: conic-gradient(from 0deg, var(--color-primary), var(--color-accent), var(--color-info), var(--color-primary));
      animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce){ .prompt .spark { animation: none; } }
    .prompt .text { flex: 1; text-align: left; font-size: clamp(14px,1.4vw,17px); color: #fff; min-height: 1.3em; }
    .prompt .text .caret { display: inline-block; width: 2px; height: 1.1em; background: var(--color-accent); vertical-align: -2px; margin-left: 1px; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .prompt .status { flex: none; font-size: 12px; color: var(--color-accent); display: flex; align-items: center; gap: 7px; min-width: 92px; justify-content: flex-end; }
    .prompt .status .ring { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--color-accent); border-top-color: transparent; animation: spin 0.7s linear infinite; }
    .prompt .status.done .ring { border: 2px solid var(--color-accent); animation: none; }

    .nav { position: absolute; top: 18px; left: 28px; z-index: 7; }
  </style>
</head>
<body>
  <main class="stage">
    <gl-wc id="bg" preset="mesh-gradient" intensity="0.6" speed="0.5"></gl-wc>
    <div class="veil"></div>

    <header class="topbar">
      <div class="brand"><span class="spark"></span> gl-wc&nbsp;studio</div>
      <a href="./">&larr; demos</a>
    </header>

    <div class="center">
      <div class="result-chip"><span class="dot"></span> gl-wc-diffusion v1 &middot; <code id="chipPreset">mesh-gradient</code></div>
      <h1 id="headline">Describe a background. Watch it render.</h1>
    </div>

    <div class="prompt">
      <span class="spark"></span>
      <div class="text"><span id="promptText"></span><span class="caret"></span></div>
      <div class="status" id="status"><span class="ring"></span><span id="statusLabel">ready</span></div>
    </div>

    <gl-wc class="grain" preset="grain" intensity="0.45" density="0.7"></gl-wc>
  </main>

  <script type="module" src="../src/gl-wc.js"></script>
  <script type="module">
    // A faux "prompt → background" generator: type a prompt, show a spinner,
    // then live-swap the gl-wc preset. gl-wc's runtime preset hot-swap +
    // theme-token reads make each "generation" instant and dependency-free.
    const bg = document.getElementById('bg');
    const promptText = document.getElementById('promptText');
    const status = document.getElementById('status');
    const statusLabel = document.getElementById('statusLabel');
    const chipPreset = document.getElementById('chipPreset');
    const headline = document.getElementById('headline');

    const JOBS = [
      { p: 'an aurora over arctic mountains at 2am',        preset: 'aurora',     attrs: { intensity: 0.85, density: 0.45, speed: 0.4 }, tokens: { '--color-primary':'#4dffa1','--color-accent':'#5ec8ff','--color-info':'#ff5fc8','--color-background':'#04060e' } },
      { p: 'a busy trading terminal, green and red',        preset: 'trades',     attrs: { density: 0.6, speed: 1 },     tokens: { '--color-primary':'#26d07c','--color-accent':'#ff4d6d','--color-foreground':'#d7e6ff','--color-background':'#05080f' } },
      { p: 'a calm pastel marble, mallsoft mood',           preset: 'marble',     attrs: { intensity: 0.5, density: 0.4, speed: 0.5 }, tokens: { '--color-primary':'#ffd6ec','--color-accent':'#bfe6f0','--color-background':'#f6e7f2','--color-foreground':'#6a5a72' } },
      { p: 'demoscene plasma, loud and electric',           preset: 'plasma',     attrs: { intensity: 0.8, density: 0.55, speed: 1.4 }, tokens: { '--color-primary':'#ff2bd6','--color-accent':'#2bd4ff','--color-info':'#ffe23a','--color-background':'#050208' } },
      { p: 'a word cloud about machine learning',           preset: 'wordcloud',  attrs: { speed: 1 },                  text: 'neural|tensor|gradient|prompt|token|latent|diffusion|transformer|vector|model|inference|embedding|attention|weights|sample', tokens: { '--color-primary':'#7c6cff','--color-accent':'#18d2c4','--color-info':'#ff6fae','--color-background':'#0a0a14' } },
      { p: 'a movement map of global traffic',              preset: 'vectormap',  attrs: { density: 0.6, speed: 0.6 },   tokens: { '--color-primary':'#5b8eff','--color-accent':'#ffb000','--color-info':'#25d0a6','--color-background':'#04101c' } },
      { p: 'a Stripe-style hero gradient',                  preset: 'mesh-gradient', attrs: { intensity: 0.7, speed: 0.45 }, tokens: { '--color-primary':'#635bff','--color-accent':'#00d4ff','--color-info':'#ff5996','--color-background':'#0a2540' } },
    ];

    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function typeOut(str) {
      promptText.textContent = '';
      for (let i = 0; i < str.length; i++) { promptText.textContent += str[i]; await sleep(22 + Math.random() * 30); }
    }

    function applyTokens(tokens) {
      // Clear any previously-set per-instance tokens, then apply the job's.
      for (const k of ['--color-primary','--color-accent','--color-info','--color-background','--color-foreground']) bg.style.removeProperty(k);
      for (const [k, v] of Object.entries(tokens || {})) bg.style.setProperty(k, v);
    }

    async function run() {
      let i = 0;
      // initial tokens for the opening mesh-gradient
      applyTokens(JOBS[6].tokens);
      while (true) {
        const job = JOBS[i % JOBS.length];
        // type the prompt
        status.classList.remove('done'); statusLabel.textContent = 'ready';
        await typeOut(job.p);
        // generating
        statusLabel.textContent = 'generating';
        bg.style.opacity = '0.35';
        await sleep(900);
        // apply the "result"
        applyTokens(job.tokens);
        if (job.text != null) bg.setAttribute('text', job.text); else bg.removeAttribute('text');
        for (const [k, v] of Object.entries(job.attrs || {})) bg.setAttribute(k, String(v));
        bg.setAttribute('preset', job.preset);
        await bg.ready;
        bg.style.opacity = '1';
        chipPreset.textContent = job.preset;
        status.classList.add('done'); statusLabel.textContent = 'done';
        headline.textContent = '“' + job.p + '”';
        await sleep(3600);
        i++;
      }
    }
    run();
  </script>
</body>
</html>
