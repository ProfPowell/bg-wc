<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pop Art &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #fff4d6;
      --color-foreground: #0a0a0a;
      --color-primary: #ffe04a;   /* yellow */
      --color-accent: #ff3b4e;     /* red */
      --color-info: #2b6cff;       /* blue */
      --ink: #0a0a0a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--ink); color: var(--ink); overflow: hidden; }
    body { font-family: Anton, Arial, sans-serif; min-height: 100vh; }

    .page { position: relative; width: 100vw; height: 100vh; padding: 18px; }
    .panels {
      position: relative; width: 100%; height: 100%;
      display: grid; grid-template-columns: 1.4fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px;
      border: 6px solid var(--ink);
    }
    .panel { position: relative; overflow: hidden; border: 5px solid var(--ink); background: #fff; }
    .panel gl-wc { position: absolute; inset: 0; }
    .panel.big { grid-row: 1 / 3; }

    .bubble {
      position: absolute; z-index: 3; background: #fff; border: 5px solid var(--ink);
      border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%;
      padding: 20px 26px; max-width: 62%;
      font-family: 'Bangers', sans-serif; font-weight: 400;
      font-size: clamp(20px, 3vw, 40px); line-height: 1.05; letter-spacing: 0.02em;
      color: var(--ink); box-shadow: 6px 6px 0 var(--ink);
    }
    .bubble.tl { top: 18px; left: 18px; }

    .sfx {
      position: absolute; z-index: 3;
      font-family: 'Bangers', sans-serif;
      font-size: clamp(48px, 11vw, 150px); line-height: 0.9;
      color: var(--color-primary);
      -webkit-text-stroke: 5px var(--ink); paint-order: stroke fill;
      text-shadow: 8px 8px 0 var(--color-accent);
      transform: rotate(-8deg);
    }
    .sfx.pow { bottom: 8%; left: 6%; }
    .sfx.zap { top: 10%; right: 6%; color: var(--color-info); text-shadow: 6px 6px 0 var(--ink); transform: rotate(7deg); font-size: clamp(30px, 6vw, 80px); }

    .caption {
      position: absolute; z-index: 3; bottom: 10px; left: 10px; right: 10px;
      background: var(--color-primary); border: 4px solid var(--ink);
      padding: 8px 12px; font-family: Anton, sans-serif; font-size: clamp(12px, 1.6vw, 18px);
      letter-spacing: 0.04em; text-transform: uppercase; box-shadow: 4px 4px 0 var(--ink);
    }

    .nav { position: absolute; top: 26px; left: 30px; z-index: 10; }
    .nav a { color: #fff; text-decoration: none; font-family: Anton, sans-serif; font-size: 13px; letter-spacing: 0.18em; text-shadow: 2px 2px 0 var(--ink); }
  </style>
</head>
<body>
  <main class="page">
    <div class="panels">
      <!-- Big hero panel: comic burst -->
      <div class="panel big">
        <gl-wc preset="comic" intensity="0.8" density="0.5" speed="0.8"></gl-wc>
        <div class="bubble tl">A web component?!<br>In MY graphics layer?!</div>
        <div class="sfx pow">POP!</div>
      </div>
      <!-- Top-right: benday dots -->
      <div class="panel">
        <gl-wc preset="benday" intensity="0.7" density="0.45" speed="0.5"></gl-wc>
        <div class="sfx zap">ZAP!</div>
      </div>
      <!-- Bottom-right: benday with caption -->
      <div class="panel">
        <gl-wc preset="benday" intensity="0.6" density="0.7" speed="0.4"
               style="--gl-wc-color-1:#2b6cff; --gl-wc-color-2:#ff3b4e; --gl-wc-color-3:#ffe04a;"></gl-wc>
        <div class="caption">Meanwhile, at the CSS factory…</div>
      </div>
    </div>
    <nav class="nav"><a href="./">&larr; DEMOS</a></nav>
  </main>
  <script type="module" src="../src/gl-wc.js"></script>
</body>
</html>
