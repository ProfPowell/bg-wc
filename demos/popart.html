<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pop Art &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #fff4d6;
      --color-foreground: #0a0a0a;
      --color-primary: #ffe04a;   /* yellow */
      --color-accent: #ff3b4e;     /* red */
      --color-info: #2b6cff;       /* blue */
      --ink: #0a0a0a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--ink); color: var(--ink); overflow: hidden; }
    body { font-family: Anton, Arial, sans-serif; height: 100vh; padding: 18px; }

    /* The comic page: <main> is the grid; each panel is a <figure> whose
       data-background attribute injects the art behind its content. */
    main {
      position: relative; width: 100%; height: 100%;
      display: grid; grid-template-columns: 1.4fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px;
      border: 6px solid var(--ink);
    }
    figure { position: relative; overflow: hidden; margin: 0; border: 5px solid var(--ink); background: #fff; }
    figure:first-child { grid-row: 1 / 3; }

    /* Speech bubble */
    figure > p {
      position: absolute; top: 18px; left: 18px; background: #fff; border: 5px solid var(--ink);
      border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%;
      padding: 20px 26px; max-width: 62%; margin: 0;
      font-family: 'Bangers', sans-serif; font-weight: 400;
      font-size: clamp(20px, 3vw, 40px); line-height: 1.05; letter-spacing: 0.02em;
      color: var(--ink); box-shadow: 6px 6px 0 var(--ink);
    }

    /* Onomatopoeia */
    i {
      position: absolute; font-style: normal;
      font-family: 'Bangers', sans-serif;
      font-size: clamp(48px, 11vw, 150px); line-height: 0.9;
      color: var(--color-primary);
      -webkit-text-stroke: 5px var(--ink); paint-order: stroke fill;
      text-shadow: 8px 8px 0 var(--color-accent);
      transform: rotate(-8deg);
    }
    figure:first-child i { bottom: 8%; left: 6%; }
    figure:nth-of-type(2) i { top: 10%; right: 6%; color: var(--color-info); text-shadow: 6px 6px 0 var(--ink); transform: rotate(7deg); font-size: clamp(30px, 6vw, 80px); }

    figcaption {
      position: absolute; bottom: 10px; left: 10px; right: 10px;
      background: var(--color-primary); border: 4px solid var(--ink);
      padding: 8px 12px; font-family: Anton, sans-serif; font-size: clamp(12px, 1.6vw, 18px);
      letter-spacing: 0.04em; text-transform: uppercase; box-shadow: 4px 4px 0 var(--ink);
    }

    body > nav { position: absolute; top: 26px; left: 30px; z-index: 10; }
    body > nav a { color: #fff; text-decoration: none; font-family: Anton, sans-serif; font-size: 13px; letter-spacing: 0.18em; text-shadow: 2px 2px 0 var(--ink); }
  </style>
</head>
<body>
  <main>
    <!-- Big hero panel: comic burst -->
    <figure data-background="comic" data-background-intensity="0.8" data-background-density="0.5" data-background-speed="0.8">
      <p>A web component?!<br>In MY graphics layer?!</p>
      <i>POP!</i>
    </figure>
    <!-- Top-right: benday dots -->
    <figure data-background="benday" data-background-intensity="0.7" data-background-density="0.45" data-background-speed="0.5">
      <i>ZAP!</i>
    </figure>
    <!-- Bottom-right: benday recolored via data-background-color-* -->
    <figure data-background="benday" data-background-intensity="0.6" data-background-density="0.7" data-background-speed="0.4"
            data-background-color-1="#2b6cff" data-background-color-2="#ff3b4e" data-background-color-3="#ffe04a">
      <figcaption>Meanwhile, at the CSS factory&hellip;</figcaption>
    </figure>
  </main>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <script type="module" src="../src/data-background.js"></script>
</body>
</html>
