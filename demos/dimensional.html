<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Test fixture: driven by test/css3d.spec.js ("dimensional demo renders both
       presets with content on top"). Deliberately unlisted in the demos hub —
       hyperspace.html and tunnel-zoom.html are the polished demos of these presets.
       Note: that spec's ".overlay h1" locator targets a legacy class hook this
       conversion cannot keep (zero class= is a hard rule); the spec will need a
       selector update in a follow-up. -->
  <title>bg-wc — dimensional presets</title>
  <style>
    :root {
      --color-primary: #6b3fa0; --color-accent: #d946ef; --color-info: #25d0a6;
      --color-background: #0e0e12; --color-foreground: #f5f5f7;
    }
    body { margin: 0; font: 16px/1.5 system-ui, sans-serif; color: var(--color-foreground); }
    section { height: 100vh; }
    scene-overlay { display: grid; min-height: 100vh; place-content: center; text-align: center; pointer-events: none; }
    scene-overlay h1 { font-size: clamp(2rem, 6vw, 5rem); margin: 0; }
    scene-overlay p { opacity: 0.85; }
  </style>
</head>
<body>
  <section data-background="fly-through" data-background-mode="ring straight cube" data-background-intensity="0.6">
    <scene-overlay>
      <h1>Fly-through</h1>
      <p>Content sits above a css3d background.</p>
    </scene-overlay>
  </section>
  <section data-background="explode" data-background-mode="radial" data-background-intensity="0.6">
    <scene-overlay>
      <h1>Explode</h1>
      <p>Theme-colored particle burst.</p>
    </scene-overlay>
  </section>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
