<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facet &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0c0a17;
      --color-foreground: #f1ecff;
      --color-primary: #7a5cff;
      --color-accent: #ff5ca8;
      --color-info: #2fd8c6;
      --color-warning: #ffd166;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Outfit', system-ui, sans-serif; min-height: 100vh; }
    .stage { position: relative; width: 100vw; height: 100vh; }
    bg-wc.bg { position: absolute; inset: 0; }
    .scrim { position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(12,10,23,0.2) 0%, rgba(12,10,23,0.82) 100%); }

    .nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    .nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.65; }
    .nav a:hover { opacity: 1; }

    .content { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    .eyebrow { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.26em; color: var(--color-info); text-transform: uppercase; margin-bottom: 18px; }
    h1 { font-weight: 700; font-size: clamp(64px, 15vw, 250px); line-height: 0.9; letter-spacing: -0.03em; margin: 0;
      background: linear-gradient(120deg, var(--color-info) 0%, var(--color-primary) 45%, var(--color-accent) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lede { max-width: 540px; margin: 24px auto 0; font-size: clamp(16px, 1.3vw, 20px); line-height: 1.6; color: rgba(241,236,255,0.8); font-weight: 300; }
    .lede code { font-family: 'Space Mono', monospace; font-size: 0.84em; background: rgba(122,92,255,0.2); color: #d7ccff; padding: 2px 7px; border-radius: 4px; }
    .cta { margin-top: 32px; }
    .cta a { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; text-decoration: none;
      padding: 14px 26px; border-radius: 999px; background: linear-gradient(120deg, var(--color-primary), var(--color-accent)); color: #0c0a17; font-weight: 700; }

    .telemetry { position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; display: flex; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--color-info); opacity: 0.8; flex-wrap: wrap; gap: 12px; }
    .telemetry span { color: var(--color-foreground); opacity: 0.45; padding-right: 6px; }
  </style>
</head>
<body>
  <nav class="nav"><a href="./" target="_top">&larr; Demos</a></nav>

  <main class="stage">
    <bg-wc class="bg" preset="delaunay" intensity="0.7" density="0.55" speed="0.9"></bg-wc>
    <div class="scrim"></div>

    <div class="content">
      <div class="eyebrow">generative &middot; low-poly</div>
      <h1>Facet</h1>
      <p class="lede">
        A seeded point set, triangulated once, then warped on tiny orbits so the mesh
        ripples without ever re-triangulating. <code>preset="delaunay"</code> &mdash;
        every facet shaded from its centroid.
      </p>
      <div class="cta"><a href="#">Generate a set</a></div>
    </div>

    <div class="telemetry">
      <div><span>preset</span>delaunay</div>
      <div><span>method</span>bowyer&ndash;watson</div>
      <div><span>render</span>canvas2d</div>
      <div><span>palette</span>theme</div>
    </div>
  </main>

  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
