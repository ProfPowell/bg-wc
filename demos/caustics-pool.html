<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caustics Pool &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #07556e;
      --color-foreground: #f3fcff;
      --color-primary: #b3f0ff;
      --color-accent: #5ee2ff;
      --color-info: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: Manrope, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .stage { position: relative; width: 100vw; height: 100vh; }

    /* Deep gradient water */
    .water-tint {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(180deg, #0b8aa8 0%, #07556e 60%, #033a4d 100%);
    }
    /* Caustics preset multiplied over the water */
    bg-wc.caustics {
      position: absolute; inset: 0; z-index: 2;
      mix-blend-mode: screen;
      opacity: 0.92;
    }

    /* Light shafts from the surface */
    .shaft {
      position: absolute; top: -20vh; width: 22vw; height: 140vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0.32), transparent 70%);
      filter: blur(20px);
      mix-blend-mode: screen;
      z-index: 3; pointer-events: none;
    }
    .s1 { left: 10vw;  transform: rotate(8deg); }
    .s2 { left: 38vw;  transform: rotate(-6deg); width: 18vw; opacity: 0.7; }
    .s3 { left: 64vw;  transform: rotate(10deg); width: 24vw; opacity: 0.85; }
    .s4 { left: 84vw;  transform: rotate(-4deg); width: 16vw; opacity: 0.6; }

    /* Floating glass card with the content */
    .content {
      position: absolute; inset: 0; z-index: 6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 clamp(20px, 5vw, 80px);
    }
    .glass {
      max-width: 620px; width: 100%;
      padding: 36px clamp(24px, 4vw, 40px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      box-shadow: 0 24px 60px -16px rgba(0,40,60,0.55), inset 0 1px 0 rgba(255,255,255,0.5);
      text-align: center;
    }
    .eyebrow {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.78); margin-bottom: 16px; font-weight: 600;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 60px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
    }
    .lede {
      margin: 18px 0 26px;
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.86);
    }
    .lede code { background: rgba(0,0,0,0.18); padding: 2px 7px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.92em; }

    .meta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.25);
    }
    .meta > div { font-size: 12px; opacity: 0.85; }
    .meta > div b { display: block; font-size: 22px; font-weight: 700; opacity: 1; margin-bottom: 4px; }

    /* Surface ripple at the very top */
    .surface {
      position: absolute; left: 0; right: 0; top: 0; height: 8vh;
      z-index: 4; pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(ellipse at 70% 0%, rgba(255,255,255,0.35), transparent 60%);
      filter: blur(2px);
    }

    .nav { position: absolute; top: 22px; left: 28px; z-index: 12; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
    .nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.85; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    .nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav class="nav"><a href="./">&larr; Demos</a></nav>
  <main class="stage">
    <div class="water-tint"></div>
    <bg-wc class="caustics" preset="caustics" intensity="0.85" density="0.45" speed="0.55"></bg-wc>
    <div class="surface"></div>
    <div class="shaft s1"></div>
    <div class="shaft s2"></div>
    <div class="shaft s3"></div>
    <div class="shaft s4"></div>

    <div class="content">
      <div class="glass">
        <div class="eyebrow">14 / Caustics</div>
        <h1>Six metres down, the light still works.</h1>
        <p class="lede">
          <code>preset="caustics"</code> &mdash; two warped sinusoidal fields, raised to a power
          to bring out the bright veins, screened onto a deep-water gradient. CSS does the
          shafts and the glass card.
        </p>
        <div class="meta">
          <div><b>6m</b>depth</div>
          <div><b>2.8KB</b>shader size</div>
          <div><b>&lt; 2ms</b>per frame</div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
