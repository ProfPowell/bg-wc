<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caustics Pool &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #07556e;
      --color-foreground: #f3fcff;
      --color-primary: #b3f0ff;
      --color-accent: #5ee2ff;
      --color-info: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: Manrope, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* Deep gradient water; the caustics preset is injected as its first
       child by the data-background binder and screens on top of it. The
       binder forces position:relative on this element, so it fills main
       as the sole in-flow child rather than via position:absolute. */
    water-tint {
      display: block; width: 100%; height: 100%; z-index: 1;
      background: linear-gradient(180deg, #0b8aa8 0%, #07556e 60%, #033a4d 100%);
    }
    water-tint > bg-wc {
      mix-blend-mode: screen;
      opacity: 0.92;
    }

    /* Light shafts from the surface */
    light-shaft {
      display: block; position: absolute; top: -20vh; width: 22vw; height: 140vh;
      background: linear-gradient(to bottom, rgba(255,255,255,0.32), transparent 70%);
      filter: blur(20px);
      mix-blend-mode: screen;
      z-index: 3; pointer-events: none;
    }
    light-shaft[data-beam="1"] { left: 10vw;  transform: rotate(8deg); }
    light-shaft[data-beam="2"] { left: 38vw;  transform: rotate(-6deg); width: 18vw; opacity: 0.7; }
    light-shaft[data-beam="3"] { left: 64vw;  transform: rotate(10deg); width: 24vw; opacity: 0.85; }
    light-shaft[data-beam="4"] { left: 84vw;  transform: rotate(-4deg); width: 16vw; opacity: 0.6; }

    /* Floating glass card with the content */
    pool-frame {
      display: flex; position: absolute; inset: 0; z-index: 6;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 0 clamp(20px, 5vw, 80px);
    }
    dive-card {
      display: block; max-width: 620px; width: 100%;
      padding: 36px clamp(24px, 4vw, 40px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.35);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      box-shadow: 0 24px 60px -16px rgba(0,40,60,0.55), inset 0 1px 0 rgba(255,255,255,0.5);
      text-align: center;
    }
    dive-card small {
      display: block;
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.78); margin-bottom: 16px; font-weight: 600;
    }
    dive-card h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 60px);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.05;
    }
    dive-card p {
      margin: 18px 0 26px;
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.86);
    }
    dive-card p code { background: rgba(0,0,0,0.18); padding: 2px 7px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.92em; }

    stat-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.25);
    }
    stat-item { display: block; font-size: 12px; opacity: 0.85; }
    stat-item strong { display: block; font-size: 22px; font-weight: 700; opacity: 1; margin-bottom: 4px; }

    /* Surface ripple at the very top */
    surface-glare {
      display: block; position: absolute; left: 0; right: 0; top: 0; height: 8vh;
      z-index: 4; pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.5), transparent 60%),
        radial-gradient(ellipse at 70% 0%, rgba(255,255,255,0.35), transparent 60%);
      filter: blur(2px);
    }

    nav { position: absolute; top: 22px; left: 28px; z-index: 12; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.85; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <main>
    <water-tint data-background="caustics" data-background-intensity="0.85" data-background-density="0.45" data-background-speed="0.55"></water-tint>
    <surface-glare></surface-glare>
    <light-shaft data-beam="1"></light-shaft>
    <light-shaft data-beam="2"></light-shaft>
    <light-shaft data-beam="3"></light-shaft>
    <light-shaft data-beam="4"></light-shaft>

    <pool-frame>
      <dive-card>
        <small>14 / Caustics</small>
        <h1>Six metres down, the light still works.</h1>
        <p>
          <code>preset="caustics"</code> &mdash; two warped sinusoidal fields, raised to a power
          to bring out the bright veins, screened onto a deep-water gradient. CSS does the
          shafts and the glass card.
        </p>
        <stat-row>
          <stat-item><strong>6m</strong>depth</stat-item>
          <stat-item><strong>2.8KB</strong>shader size</stat-item>
          <stat-item><strong>&lt; 2ms</strong>per frame</stat-item>
        </stat-row>
      </dive-card>
    </pool-frame>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
