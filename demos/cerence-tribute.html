<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flowlines &mdash; bg-wc demo</title>
  <style>
    :root {
      /* Cerence-style: dark navy base, cyan-teal streamlines. */
      --color-background: #0a1626;
      --color-primary:    #4dd0c8;
      --color-accent:     #2aa5b8;
      --color-info:       #1a6b7a;
      --color-text:       #e6f4f7;
      --color-foreground: #e6f4f7;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--color-background);
      color: var(--color-text);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    }
    body { min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }

    brief-panel {
      display: block; position: absolute; z-index: 5;
      top: 50%; left: 8vw;
      transform: translateY(-50%);
      max-width: 640px;
    }
    brief-panel h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      letter-spacing: -0.025em;
      line-height: 1.04;
      margin: 0 0 1.25rem;
      font-weight: 300;
    }
    brief-panel h1 strong { font-weight: 700; color: var(--color-primary); }
    brief-panel p {
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      color: rgba(230, 244, 247, 0.78);
      margin: 0 0 2rem;
      line-height: 1.55;
    }
    meta-row {
      display: flex; gap: 1.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(230, 244, 247, 0.55);
    }
    meta-tag {
      display: block;
    }
    meta-tag::before {
      content: ""; display: inline-block;
      width: 6px; height: 6px;
      background: var(--color-primary);
      margin-right: 8px; vertical-align: middle;
    }

    nav { position: absolute; z-index: 6; top: 24px; left: 28px; }
    nav a {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(230, 244, 247, 0.55);
      text-decoration: none;
    }
    nav a:hover { color: var(--color-primary); }
  </style>
</head>
<body>
  <main data-background="flowlines" data-background-density="0.6" data-background-intensity="0.55" data-background-speed="0.35">
    <nav><a href="./" target="_top">&larr; Demos</a></nav>

    <brief-panel>
      <h1>Website <strong>Redesign</strong>.</h1>
      <p>
        Thin streamlines flow across a dark canvas, tracing the slow
        rhythm of a 2D vector field. Same component, no SVG, no library
        soup &mdash; just <code>preset="flowlines"</code>.
      </p>
      <meta-row>
        <meta-tag>bg-wc &times; flowlines</meta-tag>
        <meta-tag>Canvas2D</meta-tag>
        <meta-tag>theme-aware</meta-tag>
      </meta-row>
    </brief-panel>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
