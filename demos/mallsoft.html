<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mallsoft &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #f6e7f2;
      --color-foreground: #6a5a72;
      --color-primary: #ffd6ec;   /* soft pink */
      --color-accent: #bfe6f0;     /* soft teal */
      --color-info: #e7d3ff;       /* soft lavender */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #efe3ee; color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }

    .plaza { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    bg-wc.marble { position: absolute; inset: 0; z-index: 0; }

    /* Soft haze + a slow drift on the whole marble layer (still-image drift). */
    bg-wc.marble { animation: drift 28s ease-in-out infinite alternate; transform-origin: center; }
    @keyframes drift {
      from { transform: scale(1.08) translate(-1.5%, -1%); }
      to   { transform: scale(1.14) translate(1.5%, 1%); }
    }
    @media (prefers-reduced-motion: reduce) { bg-wc.marble { animation: none; transform: scale(1.08); } }

    /* Checkerboard marble floor in perspective. */
    .floor {
      position: absolute; left: -20vw; right: -20vw; bottom: 0; height: 46vh; z-index: 1;
      background:
        conic-gradient(#ffffffcc 0 25%, #d9c7e0aa 0 50%, #ffffffcc 0 75%, #d9c7e0aa 0) ;
      background-size: 64px 64px;
      transform: perspective(420px) rotateX(64deg); transform-origin: top;
      opacity: 0.55;
      mask-image: linear-gradient(to top, #000 35%, transparent);
      -webkit-mask-image: linear-gradient(to top, #000 35%, transparent);
    }

    /* Grain over everything. */
    .grain { position: absolute; inset: 0; z-index: 4; pointer-events: none; mix-blend-mode: soft-light; opacity: 0.5; }

    .content {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 18px;
    }
    .jp {
      font-family: 'Noto Serif JP', serif; font-weight: 300;
      font-size: clamp(14px, 2vw, 22px); letter-spacing: 0.5em;
      color: #fff; opacity: 0.85; text-shadow: 0 1px 8px rgba(120,80,130,0.4);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(48px, 10vw, 150px); letter-spacing: 0.32em;
      margin: 0; color: #fff;
      text-shadow: 0 2px 20px rgba(150,90,160,0.5), 0 0 2px rgba(255,255,255,0.8);
    }
    .tag {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(15px, 1.6vw, 22px); color: #fff; opacity: 0.85;
    }
    .floating {
      position: absolute; z-index: 5; font-size: clamp(28px, 4vw, 52px);
      filter: drop-shadow(0 6px 12px rgba(120,80,130,0.35));
      animation: bob 9s ease-in-out infinite;
    }
    .f1 { top: 16%; left: 14%; } .f2 { top: 22%; right: 12%; animation-delay: -3s; }
    .f3 { bottom: 30%; left: 18%; animation-delay: -6s; }
    @keyframes bob { 50% { transform: translateY(-16px); } }
    @media (prefers-reduced-motion: reduce) { .floating { animation: none; } }

    .nav { position: absolute; top: 24px; left: 30px; z-index: 8; }
    .nav a { color: #fff; text-decoration: none; font-size: 12px; letter-spacing: 0.2em; opacity: 0.8; text-shadow: 0 1px 6px rgba(120,80,130,0.5); }
  </style>
</head>
<body>
  <main class="plaza">
    <bg-wc class="marble" preset="marble" intensity="0.55" density="0.4" speed="0.5"></bg-wc>
    <div class="floor"></div>

    <div class="floating f1">&#127995;</div>
    <div class="floating f2">&#9970;</div>
    <div class="floating f3">&#128330;</div>

    <div class="content">
      <div class="jp">&#34503;&#27671;&#27874; &middot; &#12503;&#12521;&#12470;</div>
      <h1>PLAZA</h1>
      <div class="tag">&mdash; soft hours, marble floors &mdash;</div>
    </div>

    <bg-wc class="grain" preset="grain" intensity="0.45" density="0.7"></bg-wc>
    <nav class="nav"><a href="./" target="_top">&larr; Demos</a></nav>
  </main>
  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
