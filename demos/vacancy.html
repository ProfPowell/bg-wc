<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vacancy &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0d0a18;   /* desert night */
      --color-foreground: #f4eee2;
      --color-primary: #4a9aa8;      /* teal tube */
      --color-accent: #ff5fa2;       /* pink tube */
      --color-info: #7fe3d2;
      --color-warning: #ffc257;      /* chase bulbs */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Bricolage Grotesque', system-ui, sans-serif; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    motel-scrim { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: linear-gradient(180deg, rgba(13,10,24,0.3) 0%, transparent 35%, rgba(13,10,24,0.92) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.65; }
    nav a:hover { opacity: 1; }

    motel-content { display: block; position: absolute; left: 0; right: 0; bottom: clamp(34px, 8vh, 90px); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    h1 { font-weight: 700; font-size: clamp(34px, 5vw, 68px); line-height: 1.02; letter-spacing: -0.01em; margin: 0; }
    h1 em { font-style: normal; color: var(--color-accent); }
    motel-content p { max-width: 560px; margin: 14px auto 0; font-size: clamp(14px, 1.15vw, 18px); line-height: 1.6; color: rgba(244,238,226,0.72); }
    motel-content p code { font-family: 'Space Mono', monospace; font-size: 0.84em; background: rgba(255,95,162,0.16); color: var(--color-accent); padding: 2px 7px; border-radius: 4px; }
    motel-content ul { list-style: none; margin: 20px 0 0; padding: 0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
    motel-content ul li { border: 1px solid rgba(127,227,210,0.4); color: var(--color-info); border-radius: 999px; padding: 7px 14px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="neon-sign" data-background-text="VACANCY|THE COMET|POOL" data-background-intensity="0.85" data-background-density="0.5" data-background-speed="1">
    <!-- The sign cycles its lines on '|', one letter always buzzing. -->
    <motel-scrim></motel-scrim>

    <motel-content>
      <h1>The Comet Motor Inn &mdash; <em>always room</em>.</h1>
      <p>
        Forty-one units on Route 9, ice machine that mostly works, sign that
        mostly doesn't. <code>preset="neon-sign"</code> with
        <code>text="VACANCY|THE COMET|POOL"</code> &mdash; the buzz is included.
      </p>
      <ul>
        <li>color tv</li><li>heated pool</li><li>magic fingers</li><li>free ice</li>
      </ul>
    </motel-content>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
