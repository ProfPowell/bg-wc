<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpha &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #06060e;
      --color-foreground: #f3e8c0;
      --color-primary: #ff6f3c;     /* NASA worm orange */
      --color-accent: #f3c969;       /* warm cream */
      --color-info: #7a4dff;         /* dim cosmic purple */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* Lava preset doing nebula duty */
    nebula-layer { display: block; position: absolute; inset: 0; opacity: 0.72; }
    /* Stars preset on top, sparse + slow */
    star-layer { display: block; position: absolute; inset: 0; z-index: 2; }

    /* Earth/moon silhouette in lower-right */
    planet-disc {
      display: block;
      position: absolute; right: -8vw; bottom: -22vw;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%,
          rgba(243,232,192,0.95) 0%,
          rgba(255,111,60,0.45) 35%,
          rgba(122,77,255,0.25) 60%,
          rgba(6,6,14,0) 75%);
      filter: blur(1px);
      z-index: 3;
      pointer-events: none;
    }
    planet-disc::before {
      content: ""; position: absolute; inset: 8%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 30%, #f3c969, #ff6f3c 45%, #4a2a18 80%, #06060e 100%);
      box-shadow: inset -40px -40px 80px rgba(0,0,0,0.45);
    }

    /* Concentric ring markers — instrumentation */
    range-rings {
      display: block;
      position: absolute; right: 36px; top: 36px;
      width: 220px; height: 220px;
      z-index: 4; opacity: 0.85;
    }
    range-rings svg { width: 100%; height: 100%; }

    mission-brief {
      display: flex; position: absolute; inset: 0; z-index: 6;
      flex-direction: column; justify-content: center;
      padding: 0 clamp(28px, 6vw, 96px);
    }
    mission-meta {
      display: block;
      font-family: 'Major Mono Display', ui-monospace, monospace;
      font-size: 13px; letter-spacing: 0.18em;
      color: var(--color-primary);
      margin-bottom: 26px;
      text-transform: lowercase;
    }
    mission-meta signal-dot { display: inline; color: var(--color-foreground); }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(46px, 8.5vw, 132px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--color-foreground);
      text-transform: lowercase;
      font-weight: 400;
    }
    h1 signal-o {
      display: inline;
      color: var(--color-primary);
      font-weight: 400;
    }
    mission-brief p {
      font-family: Inter, sans-serif;
      font-size: clamp(15px, 1.1vw, 18px);
      line-height: 1.6;
      max-width: 480px;
      opacity: 0.85;
      margin: 32px 0 0;
    }
    mission-brief p code { font-family: 'Major Mono Display', monospace; color: var(--color-primary); }

    mission-telemetry {
      display: flex;
      position: absolute; bottom: 32px; left: clamp(28px, 6vw, 96px); right: clamp(28px, 6vw, 96px);
      z-index: 7;
      gap: 28px; flex-wrap: wrap;
      font-family: 'Major Mono Display', monospace;
      font-size: 11px; letter-spacing: 0.16em;
      color: var(--color-accent);
    }
    telemetry-item { display: block; }
    telemetry-item signal-key { display: inline; color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }

    nav { position: absolute; top: 28px; left: 32px; z-index: 12;
      font-family: 'Major Mono Display', monospace; font-size: 12px;
      letter-spacing: 0.2em; }
    nav a { color: var(--color-primary); text-decoration: none; opacity: 0.85; }
    nav a:hover { opacity: 1; }

    /* Vignette */
    vignette-mask {
      display: block; position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(ellipse at 30% 50%, transparent 0%, rgba(6,6,14,0.6) 95%);
    }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <main>
    <nebula-layer data-background="lava" data-background-intensity="0.55" data-background-density="0.4" data-background-speed="0.35"></nebula-layer>
    <star-layer data-background="stars" data-background-intensity="0.55" data-background-density="0.35" data-background-speed="0.3"
           data-background-color-bg="transparent"></star-layer>
    <planet-disc></planet-disc>
    <vignette-mask></vignette-mask>

    <range-rings>
      <svg viewBox="0 0 200 200">
        <g fill="none" stroke="#f3c969" stroke-width="1" opacity="0.8">
          <circle cx="100" cy="100" r="92"/>
          <circle cx="100" cy="100" r="72"/>
          <circle cx="100" cy="100" r="52"/>
          <circle cx="100" cy="100" r="32"/>
          <line x1="100" y1="8" x2="100" y2="22"/>
          <line x1="100" y1="178" x2="100" y2="192"/>
          <line x1="8" y1="100" x2="22" y2="100"/>
          <line x1="178" y1="100" x2="192" y2="100"/>
        </g>
        <circle cx="100" cy="100" r="3" fill="#ff6f3c"/>
        <text x="100" y="14" text-anchor="middle" font-family="Major Mono Display, monospace" font-size="9" fill="#f3c969" opacity="0.85">N</text>
        <text x="100" y="194" text-anchor="middle" font-family="Major Mono Display, monospace" font-size="9" fill="#f3c969" opacity="0.85">S</text>
      </svg>
    </range-rings>

    <mission-brief>
      <mission-meta>a<signal-dot>.</signal-dot>l<signal-dot>.</signal-dot>p<signal-dot>.</signal-dot>h<signal-dot>.</signal-dot>a &nbsp;&middot;&nbsp; transmission 0<signal-dot>.</signal-dot>7<signal-dot>.</signal-dot>9</mission-meta>
      <h1>signal fr<signal-o>o</signal-o>m<br>the <signal-o>o</signal-o>uter dark.</h1>
      <p>
        Lava metaballs do the nebula. Stars drift on top. The whole composition runs
        from two <code>&lt;bg-wc&gt;</code> instances, both off-screen-paused, both motion-aware.
      </p>
    </mission-brief>

    <mission-telemetry>
      <telemetry-item><signal-key>vec</signal-key>-04.207 / +12.881</telemetry-item>
      <telemetry-item><signal-key>vel</signal-key>4.21 km/s</telemetry-item>
      <telemetry-item><signal-key>pwr</signal-key>nominal</telemetry-item>
      <telemetry-item><signal-key>ren</signal-key>webgl &middot; canvas2d</telemetry-item>
      <telemetry-item><signal-key>raf</signal-key>idle-paused</telemetry-item>
    </mission-telemetry>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
