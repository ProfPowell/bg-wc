<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linocut &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #e8dcc4;   /* warm paper */
      --color-foreground: #1a1612;   /* carve black */
      --color-primary: #1a1612;
      --color-accent: #c8502e;       /* persimmon */
      --color-info: #4f5d4a;         /* moss */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Alfa Slab One', serif; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    linocut-vignette { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 66% 62% at 50% 50%, transparent 32%, rgba(232,220,196,0.86) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.7; }
    nav a:hover { opacity: 1; }

    linocut-content { display: block; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    linocut-eyebrow { display: block; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.24em; color: var(--color-accent); opacity: 0.92; margin-bottom: 18px; text-transform: lowercase; }
    h1 { font-weight: 400; font-size: clamp(58px, 12vw, 200px); letter-spacing: 0.02em; line-height: 0.95; margin: 0; text-transform: uppercase; color: var(--color-foreground);
      text-shadow: 4px 4px 0 var(--color-accent); }
    linocut-content p { max-width: 560px; margin: 24px auto 0; font-family: 'Space Mono', monospace; font-size: clamp(14px, 1.1vw, 17px); line-height: 1.6; color: rgba(26,22,18,0.82); }
    linocut-content p code { font-size: 0.9em; background: rgba(26,22,18,0.08); padding: 2px 7px; border-radius: 4px; }

    linocut-telemetry { display: flex; position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--color-accent); opacity: 0.85; flex-wrap: wrap; gap: 12px; }
    linocut-stat { display: block; }
    linocut-stat span { color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="linocut" data-background-intensity="0.75" data-background-density="0.5" data-background-speed="0.5">
    <linocut-vignette></linocut-vignette>

    <linocut-content>
      <linocut-eyebrow>// carved &amp; rolled &middot; canvas2d</linocut-eyebrow>
      <h1>Linocut</h1>
      <p>
        Bold shapes cut from the block, gouge marks left showing, rolling past
        like the cylinder never stopped. <code>preset="linocut"</code> &mdash;
        relief printing in your theme's inks.
      </p>
    </linocut-content>

    <linocut-telemetry>
      <linocut-stat><span>preset</span>linocut</linocut-stat>
      <linocut-stat><span>render</span>canvas2d</linocut-stat>
      <linocut-stat><span>motion</span>cylinder roll</linocut-stat>
      <linocut-stat><span>palette</span>theme</linocut-stat>
    </linocut-telemetry>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
