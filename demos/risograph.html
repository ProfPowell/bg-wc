<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Risograph &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #f4efe3;   /* cream stock */
      --color-foreground: #2a2a2a;
      --color-primary: #ff48b0;      /* fluorescent pink */
      --color-accent: #0078bf;       /* riso medium blue */
      --color-info: #6b4d9e;         /* the overprint violet */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Archivo Black', sans-serif; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    riso-scrim { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 66% 62% at 50% 50%, transparent 34%, rgba(244,239,227,0.82) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.7; }
    nav a:hover { opacity: 1; }

    riso-content { display: block; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    riso-eyebrow { display: block; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.24em; color: var(--color-accent); opacity: 0.92; margin-bottom: 18px; text-transform: lowercase; }
    h1 { font-weight: 400; font-size: clamp(54px, 11vw, 190px); letter-spacing: 0.01em; line-height: 0.95; margin: 0; text-transform: uppercase; color: var(--color-primary);
      text-shadow: 5px 5px 0 var(--color-accent); }
    riso-content p { max-width: 560px; margin: 26px auto 0; font-family: 'Space Mono', monospace; font-size: clamp(14px, 1.1vw, 17px); line-height: 1.6; color: rgba(42,42,42,0.85); }
    riso-content p code { font-size: 0.9em; background: rgba(42,42,42,0.08); padding: 2px 7px; border-radius: 4px; }

    riso-foot { display: flex; position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--color-accent); opacity: 0.85; flex-wrap: wrap; gap: 12px; }
    riso-stat { display: block; }
    riso-stat span { color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="risograph" data-background-intensity="0.65" data-background-density="0.5" data-background-speed="0.4">
    <riso-scrim></riso-scrim>

    <riso-content>
      <riso-eyebrow>// two-ink overprint &middot; webgl</riso-eyebrow>
      <h1>Riso<br>graph</h1>
      <p>
        Two drums, slightly out of register: blobs in one ink, bars in the other,
        multiplying into a third color wherever they overlap.
        <code>preset="risograph"</code> &mdash; grain, dropouts and all.
      </p>
    </riso-content>

    <riso-foot>
      <riso-stat><span>preset</span>risograph</riso-stat>
      <riso-stat><span>render</span>webgl</riso-stat>
      <riso-stat><span>inks</span>primary &times; accent</riso-stat>
      <riso-stat><span>palette</span>theme</riso-stat>
    </riso-foot>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
