<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8-bit Retro &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0a0a18;
      --color-foreground: #00ff88;
      --color-primary: #ff00aa;
      --color-accent: #00ddff;
      --color-info: #ffee00;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); }
    body { font-family: 'VT323', 'Courier New', monospace; min-height: 100vh; overflow: hidden; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* Background layer: chunky dither, rendered at low pixel-ratio for that authentically blocky look. */
    bg-wc::part(canvas) { image-rendering: pixelated; image-rendering: crisp-edges; }

    /* CRT effects */
    crt-scanlines {
      display: block; position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.22) 3px,
        rgba(0,0,0,0.22) 4px
      );
      mix-blend-mode: multiply;
    }
    crt-vignette {
      display: block; position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
    }
    crt-flicker {
      display: block; position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: rgba(255,255,255,0.02);
      animation: flicker 0.13s steps(2) infinite;
    }
    @keyframes flicker { 50% { background: rgba(0,0,0,0.03); } }

    arcade-content {
      display: flex; position: absolute; inset: 0; z-index: 6;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: clamp(20px, 3vw, 36px); padding: 6vh 6vw;
    }
    h1 {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: clamp(32px, 8vw, 96px);
      color: var(--color-info);
      text-shadow:
        4px 4px 0 var(--color-primary),
        8px 8px 0 var(--color-accent),
        12px 12px 0 rgba(0,0,0,0.4);
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
    }
    arcade-subtitle {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.4vw, 14px);
      color: var(--color-foreground);
      letter-spacing: 0.1em;
      opacity: 0.85;
    }
    arcade-scoreboard {
      display: grid;
      font-size: clamp(16px, 2vw, 22px);
      grid-template-columns: auto auto; gap: 6px 30px;
      color: var(--color-accent);
      font-family: 'VT323', monospace;
    }
    arcade-scoreboard span[data-value] { color: var(--color-info); }
    arcade-press {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 1.5vw, 16px);
      color: var(--color-foreground);
      animation: blink 1s steps(2) infinite;
      letter-spacing: 0.15em;
    }
    @keyframes blink { 50% { opacity: 0.15; } }

    nav { position: absolute; top: 16px; left: 20px; z-index: 10; font-family: 'Press Start 2P', monospace; font-size: 9px; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.65; letter-spacing: 0.15em; }
    nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <main data-background="dither" data-background-intensity="0.95" data-background-density="0" data-background-speed="0.35" data-background-pixel-ratio="0.35">
    <crt-vignette></crt-vignette>
    <arcade-content>
      <h1>BG-WC</h1>
      <arcade-subtitle>A WEB COMPONENT FROM 198X</arcade-subtitle>
      <arcade-scoreboard>
        <span>HI-SCORE</span><span data-value>008-BIT</span>
        <span>WORLD</span><span data-value>09 / 09</span>
        <span>RENDER</span><span data-value>WEBGL</span>
      </arcade-scoreboard>
      <arcade-press>&gt;&gt;&gt; PRESS START &lt;&lt;&lt;</arcade-press>
    </arcade-content>
    <crt-scanlines></crt-scanlines>
    <crt-flicker></crt-flicker>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
