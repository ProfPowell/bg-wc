<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trading Desk &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #05080f;
      --color-foreground: #d7e6ff;
      --color-primary: #26d07c;
      --color-accent: #ff4d6d;
      --color-info: #5b8eff;
      --color-success: #26d07c;
      --color-error: #ff4d6d;
      --panel: rgba(10,16,28,0.72);
      --border: rgba(120,160,220,0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #03050a; color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'IBM Plex Mono', ui-monospace, monospace; min-height: 100vh; }

    main { position: relative; width: 100vw; height: 100vh; }
    /* The data-background host is the sole in-flow child, sized to fill the
       desk; the binder's injected bg-wc is absolute-fill inside it. */
    tape-field { display: block; width: 100%; height: 100%; opacity: 0.9; }

    desk-topbar {
      display: flex; position: absolute; top: 0; left: 0; right: 0; z-index: 4; height: 44px;
      align-items: center; gap: 18px; padding: 0 20px;
      background: linear-gradient(180deg, rgba(5,8,15,0.95), rgba(5,8,15,0.5));
      border-bottom: 1px solid var(--border);
      font-family: Inter, sans-serif; font-weight: 700; letter-spacing: 0.04em;
    }
    market-status { display: flex; color: var(--color-primary); align-items: center; gap: 8px; }
    status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); box-shadow: 0 0 8px var(--color-primary); animation: blink 1.2s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    index-quote { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 13px; opacity: 0.85; }
    index-quote b[data-trend="up"] { color: var(--color-primary); }
    index-quote b[data-trend="dn"] { color: var(--color-accent); }
    desk-clock { display: inline-block; margin-left: auto; font-family: 'IBM Plex Mono', monospace; opacity: 0.8; }

    section[data-panel] {
      position: absolute; z-index: 4; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; backdrop-filter: blur(8px);
      box-shadow: 0 14px 40px -16px rgba(0,0,0,0.7);
    }
    panel-head { display: block; font-family: Inter, sans-serif; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(215,230,255,0.7); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    panel-canvas { display: block; width: 100%; height: calc(100% - 31px); }

    section[data-panel="chart"] { left: 24px; bottom: 24px; width: min(380px, 42vw); height: 230px; }
    section[data-panel="map"]   { right: 24px; bottom: 24px; width: min(380px, 42vw); height: 230px; }

    nav { position: absolute; top: 56px; left: 22px; z-index: 6; }
    nav a { color: var(--color-info); text-decoration: none; font-size: 12px; letter-spacing: 0.12em; opacity: 0.8; }
    nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <!-- full-bleed scrolling tape -->
    <tape-field data-background="trades" data-background-density="0.65" data-background-speed="1.1"></tape-field>

    <desk-topbar>
      <market-status><status-dot></status-dot>MARKETS LIVE</market-status>
      <index-quote>S&amp;P <b data-trend="up">+0.62%</b></index-quote>
      <index-quote>NDX <b data-trend="up">+1.04%</b></index-quote>
      <index-quote>DJI <b data-trend="dn">&minus;0.18%</b></index-quote>
      <index-quote>VIX <b data-trend="dn">13.7</b></index-quote>
      <desk-clock id="clock">09:41:00 ET</desk-clock>
    </desk-topbar>

    <nav><a href="./" target="_top">&larr; Demos</a></nav>

    <section data-panel="chart">
      <panel-head>Portfolio &middot; intraday</panel-head>
      <panel-canvas data-background="dashboard" data-background-intensity="0.7" data-background-speed="1"></panel-canvas>
    </section>
    <section data-panel="map">
      <panel-head>Order flow &middot; global</panel-head>
      <panel-canvas data-background="vectormap" data-background-density="0.6" data-background-speed="0.7"></panel-canvas>
    </section>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';

    // ticking clock for flavor
    const el = document.getElementById('clock');
    let s = 9 * 3600 + 41 * 60;
    setInterval(() => {
      s++; const hh = String((s / 3600 | 0) % 24).padStart(2, '0');
      const mm = String((s / 60 | 0) % 60).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      el.textContent = `${hh}:${mm}:${ss} ET`;
    }, 1000);
  </script>
</body>
</html>
