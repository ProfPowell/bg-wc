<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tracking Station &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    /* Range control, graveyard shift. Five scopes on the board, each painted
       by data-background; status rides the data-* attributes. */
    :root {
      --color-background: #0d1510;  /* scope housing */
      --color-foreground: #d2e8d6;
      --color-primary: #52e07c;     /* phosphor sweep */
      --color-accent: #ff9838;      /* track amber */
      --color-info: #6fd2e8;        /* lidar ice */
    }
    html, body { margin: 0; background: #070b08; color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'IBM Plex Mono', monospace; height: 100vh; padding: 16px; }
    main { height: 100%; }

    range-board {
      display: grid; width: 100%; height: 100%; gap: 12px;
      grid-template-columns: 1.3fr 1fr 1fr; grid-template-rows: 1fr 1fr;
      border: 1px solid rgba(82, 224, 124, 0.4); padding: 12px;
    }
    track-scope { display: block; position: relative; overflow: hidden; border: 1px solid rgba(82, 224, 124, 0.35); border-radius: 4px; background: var(--color-background); }
    track-scope[data-span="main"] { grid-row: 1 / 3; }

    scope-label {
      display: block; position: absolute; top: 10px; left: 12px;
      font-family: Oxanium, sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--color-primary); background: rgba(13, 21, 16, 0.8); padding: 4px 10px;
      border-left: 3px solid var(--color-primary);
    }
    scope-label[data-status="contact"] { color: var(--color-accent); border-left-color: var(--color-accent); }
    scope-label small { display: block; font-family: 'IBM Plex Mono', monospace; font-weight: 400; font-size: 10px; letter-spacing: 0.12em; opacity: 0.8; margin-top: 2px; color: var(--color-foreground); }

    body > nav { position: absolute; bottom: 26px; right: 36px; z-index: 10; }
    body > nav a { color: var(--color-foreground); opacity: 0.7; text-decoration: none; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    body > nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <range-board>
      <!-- Primary surveillance -->
      <track-scope data-span="main" data-background="radar" data-background-intensity="0.7" data-background-seed="14" data-background-speed="0.8">
        <scope-label>Scope 1 &middot; Sweep <small>bearing 040 &middot; two paints, one echo</small></scope-label>
      </track-scope>
      <track-scope data-background="lidar" data-background-intensity="0.65" data-background-seed="3" data-background-speed="0.7">
        <scope-label>Scope 2 &middot; Terrain <small>lidar swath &middot; valley floor</small></scope-label>
      </track-scope>
      <track-scope data-background="asteroids" data-background-intensity="0.6" data-background-seed="27" data-background-speed="0.7">
        <scope-label data-status="contact">Scope 3 &middot; Debris <small>rocks drifting &middot; not our problem yet</small></scope-label>
      </track-scope>
      <track-scope data-background="oscilloscope" data-background-intensity="0.7" data-background-seed="9" data-background-speed="0.8">
        <scope-label>Scope 4 &middot; Carrier <small>lissajous steady &middot; signal clean</small></scope-label>
      </track-scope>
      <track-scope data-background="incoming" data-background-intensity="0.65" data-background-seed="21" data-background-speed="0.8">
        <scope-label data-status="contact">Scope 5 &middot; Intercept <small>tracks inbound &middot; counter-battery live</small></scope-label>
      </track-scope>
    </range-board>
  </main>
  <nav><a href="./index.html">&larr; bg-wc demos</a></nav>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
