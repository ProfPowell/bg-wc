<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trench Run &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* targeting-computer green/amber vector palette */
      --color-background: #00060a;
      --color-foreground: #b8ffd0;
      --color-primary: #36e26b;
      --color-accent: #ffcf3a;
      --color-info: #46d0ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Share Tech Mono', ui-monospace, monospace; min-height: 100vh; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* subtle phosphor vignette */
    hud-vignette { display: block; position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,6,10,0.7) 100%); }

    /* HUD frame */
    hud-frame { display: block; position: absolute; inset: 0; z-index: 5; pointer-events: none;
      text-shadow: 0 0 6px currentColor; }
    hud-corner {
      display: block; position: absolute; width: 64px; height: 64px;
      border: 2px solid var(--color-primary); opacity: 0.8;
    }
    hud-corner[data-pos="tl"] { top: 22px; left: 22px; border-right: 0; border-bottom: 0; }
    hud-corner[data-pos="tr"] { top: 22px; right: 22px; border-left: 0; border-bottom: 0; }
    hud-corner[data-pos="bl"] { bottom: 22px; left: 22px; border-right: 0; border-top: 0; }
    hud-corner[data-pos="br"] { bottom: 22px; right: 22px; border-left: 0; border-top: 0; }

    hud-readout { display: block; position: absolute; font-size: clamp(12px, 1.4vw, 16px); letter-spacing: 0.12em; line-height: 1.7; color: var(--color-primary); }
    hud-readout[data-side="left"]  { top: 40px; left: 40px; }
    hud-readout[data-side="right"] { top: 40px; right: 40px; text-align: right; }
    hud-readout hud-value { color: var(--color-accent); }

    hud-callout {
      display: block; position: absolute; top: 14%; left: 50%; transform: translateX(-50%);
      z-index: 6; text-align: center;
      font-family: 'Orbitron', sans-serif; font-weight: 800;
      font-size: clamp(20px, 3.4vw, 44px);
      letter-spacing: 0.18em;
      color: var(--color-accent);
      text-shadow: 0 0 12px var(--color-accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.35; } }
    @media (prefers-reduced-motion: reduce) { hud-callout { animation: none; } }
    hud-callout small { display: block; font-family: 'Share Tech Mono', monospace; font-weight: 400; font-size: 0.4em; letter-spacing: 0.3em; color: var(--color-primary); margin-top: 8px; }

    /* targeting computer — a live wireframe schematic, bottom-center */
    target-computer {
      display: block; position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 6; width: min(220px, 40vw); aspect-ratio: 1;
      border: 2px solid var(--color-primary);
      border-radius: 8px; overflow: hidden;
      box-shadow: 0 0 24px rgba(54,226,107,0.4), inset 0 0 24px rgba(54,226,107,0.15);
      background: #00080c;
    }
    target-face { display: block; width: 100%; height: 100%; }
    target-label {
      display: block; position: absolute; top: 4px; left: 8px; z-index: 2;
      font-size: 10px; letter-spacing: 0.18em; color: var(--color-primary);
    }
    target-mark {
      display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 3;
      color: var(--color-accent); font-size: 22px; opacity: 0.7;
    }

    nav { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 8; pointer-events: auto; }
    nav a { color: var(--color-primary); text-decoration: none; font-size: 12px; letter-spacing: 0.18em; opacity: 0.7; }
    nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main data-background="trench" data-background-intensity="0.7" data-background-density="0.5" data-background-speed="1.2">
    <nav><a href="./" target="_top">&larr; Demos</a></nav>

    <hud-frame>
      <hud-corner data-pos="tl"></hud-corner><hud-corner data-pos="tr"></hud-corner>
      <hud-corner data-pos="bl"></hud-corner><hud-corner data-pos="br"></hud-corner>
      <hud-readout data-side="left">
        SPD <hud-value>1.06c</hud-value><br>
        ALT <hud-value>00.4</hud-value><br>
        SHLD <hud-value>DOWN</hud-value>
      </hud-readout>
      <hud-readout data-side="right">
        TGT <hud-value>2.1m</hud-value><br>
        PORT <hud-value>LOCKED</hud-value><br>
        PROTON <hud-value>x2</hud-value>
      </hud-readout>
    </hud-frame>

    <hud-callout>STAY ON TARGET<small>USE THE FORCE</small></hud-callout>

    <target-computer>
      <target-face data-background="wireframe" data-background-intensity="0.8" data-background-speed="0.8"
                    data-background-color-1="#36e26b" data-background-color-2="#ffcf3a" data-background-color-bg="#00080c"></target-face>
      <target-label>TARGET</target-label>
      <target-mark>&#10010;</target-mark>
    </target-computer>

    <hud-vignette></hud-vignette>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
