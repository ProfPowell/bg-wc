<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fab &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #04110c;   /* solder-mask green-black */
      --color-foreground: #d6ffe8;
      --color-primary: #2faa6a;      /* trace */
      --color-accent: #38e0ff;       /* signal */
      --color-info: #c8ff5e;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Chakra Petch', system-ui, sans-serif; min-height: 100vh; }
    .stage { position: relative; width: 100vw; height: 100vh; }
    bg-wc.bg { position: absolute; inset: 0; }
    .scrim { position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 40%, rgba(4,17,12,0.88) 100%); }

    .nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    .nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.65; }
    .nav a:hover { opacity: 1; }

    .content { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    .eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.26em; color: var(--color-accent); text-transform: uppercase; margin-bottom: 18px; }
    h1 { font-weight: 700; font-size: clamp(64px, 15vw, 250px); line-height: 0.9; letter-spacing: 0.02em; margin: 0; text-transform: uppercase;
      text-shadow: 0 0 38px rgba(56,224,255,0.35); }
    .lede { max-width: 560px; margin: 24px auto 0; font-size: clamp(16px, 1.3vw, 20px); line-height: 1.55; color: rgba(214,255,232,0.82); font-family: 'IBM Plex Mono', monospace; }
    .lede code { font-size: 0.86em; background: rgba(56,224,255,0.14); color: var(--color-accent); padding: 2px 7px; border-radius: 4px; }
    .pillrow { margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .pillrow span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      border: 1px solid rgba(47,170,106,0.5); color: var(--color-info); border-radius: 6px; padding: 7px 12px; }

    .telemetry { position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; display: flex; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--color-accent); opacity: 0.82; flex-wrap: wrap; gap: 12px; }
    .telemetry span { color: var(--color-foreground); opacity: 0.45; padding-right: 6px; }
  </style>
</head>
<body>
  <nav class="nav"><a href="./" target="_top">&larr; Demos</a></nav>

  <main class="stage">
    <bg-wc class="bg" preset="circuit" intensity="0.8" density="0.55" speed="1"></bg-wc>
    <div class="scrim"></div>

    <div class="content">
      <div class="eyebrow">silicon, drawn</div>
      <h1>Fab</h1>
      <p class="lede">
        Pads, vias, IC footprints &mdash; traces routed on a 45&deg; grid with signal
        pulses running the rails. <code>preset="circuit"</code>, every layout seeded
        and deterministic.
      </p>
      <div class="pillrow"><span>45&deg; routing</span><span>annular rings</span><span>live pulses</span></div>
    </div>

    <div class="telemetry">
      <div><span>preset</span>circuit</div>
      <div><span>render</span>canvas2d</div>
      <div><span>layout</span>seeded</div>
      <div><span>palette</span>theme</div>
    </div>
  </main>

  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
