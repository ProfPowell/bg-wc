<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coastal &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #fde4cc;
      --color-foreground: #2a1d3f;
      --color-primary: #ff8a5c;
      --color-accent: #ff5e8e;
      --color-info: #6a52ff;
      --sand: #f5d8b3;
      --sea: #1d4b6e;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Fraunces', Georgia, serif; min-height: 100vh; }

    .stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }

    /* Sky / sun gl-wc mesh */
    gl-wc.sky { position: absolute; left: 0; right: 0; top: 0; height: 62vh; }

    /* Sun disc */
    .sun {
      position: absolute;
      left: 50%; top: 26vh; transform: translateX(-50%);
      width: 32vmin; height: 32vmin;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        #fff5b3 0%, #ffc880 30%, #ff8a5c 60%, rgba(255,138,92,0) 80%);
      filter: blur(2px);
      mix-blend-mode: screen;
      z-index: 2; pointer-events: none;
    }

    /* Ocean horizon band */
    .ocean {
      position: absolute; left: 0; right: 0; top: 56vh; bottom: 0;
      background: linear-gradient(180deg,
        #2a4a6a 0%, #1d4b6e 25%, #0e2a45 100%);
      z-index: 3;
    }
    /* Sun reflection on ocean */
    .reflection {
      position: absolute; left: 50%; top: 56vh;
      transform: translateX(-50%);
      width: 18vmin;
      height: 30vh;
      background: linear-gradient(180deg, rgba(255,200,128,0.55), rgba(255,138,92,0.18) 50%, transparent);
      filter: blur(2px);
      z-index: 4; pointer-events: none;
      mix-blend-mode: screen;
    }
    /* Ripples on the reflection */
    .ripple {
      position: absolute; left: 0; right: 0;
      height: 2px;
      background: rgba(255,225,180,0.55);
      mix-blend-mode: screen; z-index: 5;
      pointer-events: none;
      animation: shimmer 4s ease-in-out infinite;
    }
    .ripple.r1 { top: 60vh; }
    .ripple.r2 { top: 64vh; animation-delay: 0.6s; }
    .ripple.r3 { top: 70vh; animation-delay: 1.2s; }
    .ripple.r4 { top: 76vh; animation-delay: 1.8s; }
    .ripple.r5 { top: 84vh; animation-delay: 2.4s; }
    @keyframes shimmer {
      0%, 100% { opacity: 0.35; transform: translateX(-3px); }
      50%      { opacity: 0.85; transform: translateX(3px); }
    }
    @media (prefers-reduced-motion: reduce) { .ripple { animation: none; } }

    /* Palm silhouette in foreground */
    svg.palm {
      position: absolute;
      bottom: 0; right: 4vw;
      width: clamp(220px, 36vw, 480px); height: auto;
      z-index: 7;
      filter: drop-shadow(0 -6px 24px rgba(0,0,0,0.3));
    }

    .content {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 8vh clamp(28px, 6vw, 80px);
      z-index: 10;
      max-width: 720px;
    }
    .eyebrow {
      font-family: Inter, sans-serif;
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #ffefd1; opacity: 0.85;
      margin-bottom: 18px;
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: clamp(44px, 7vw, 104px);
      line-height: 0.98;
      letter-spacing: -0.025em;
      margin: 0;
      color: #ffefd1;
      font-style: italic;
    }
    h1 .ink { font-style: normal; color: #fff5b3; }
    p.lede {
      font-family: Inter, sans-serif;
      font-size: clamp(15px, 1.1vw, 17px);
      line-height: 1.55;
      max-width: 460px;
      color: #ffefd1;
      opacity: 0.88;
      margin: 24px 0 0;
    }

    .credit {
      position: absolute; top: 24px; right: 30px; z-index: 11;
      font-family: Inter, sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #fff5b3; opacity: 0.7;
      text-align: right; line-height: 1.7;
    }

    .nav { position: absolute; top: 22px; left: 28px; z-index: 12; font-family: Inter, sans-serif; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
    .nav a { color: #fff5b3; text-decoration: none; opacity: 0.8; }
    .nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav class="nav"><a href="./">&larr; demos</a></nav>
  <div class="credit">
    08 / Coastal<br>
    gl-wc &times; mesh-gradient
  </div>
  <main class="stage">
    <gl-wc class="sky" preset="mesh-gradient" intensity="0.85" speed="0.35"
           style="--gl-wc-color-1:#ff8a5c; --gl-wc-color-2:#ff5e8e; --gl-wc-color-3:#6a52ff; --gl-wc-color-bg:#fde4cc;"></gl-wc>
    <div class="sun"></div>
    <div class="ocean"></div>
    <div class="reflection"></div>
    <div class="ripple r1"></div>
    <div class="ripple r2"></div>
    <div class="ripple r3"></div>
    <div class="ripple r4"></div>
    <div class="ripple r5"></div>

    <svg class="palm" viewBox="0 0 400 600" preserveAspectRatio="xMaxYMax meet" aria-hidden="true">
      <!-- Trunk -->
      <path d="M 220,600 C 230,500 215,400 235,300 C 250,220 240,160 250,100" stroke="#0a0a18" stroke-width="14" fill="none" stroke-linecap="round"/>
      <!-- Fronds — long curved leaves splaying from the top -->
      <g fill="#0a0a18">
        <path d="M 250,100 C 200,80 130,90 60,60 C 130,110 200,130 250,120 Z"/>
        <path d="M 250,100 C 290,70 360,60 410,30 C 360,90 300,120 252,118 Z"/>
        <path d="M 250,100 C 230,40 220,-10 230,-30 C 250,40 260,90 254,110 Z"/>
        <path d="M 250,100 C 280,140 320,200 340,260 C 290,210 260,150 252,118 Z"/>
        <path d="M 250,100 C 210,150 170,210 130,260 C 190,210 230,150 252,118 Z"/>
        <path d="M 250,100 C 200,110 140,150 90,180 C 170,140 220,120 252,116 Z"/>
        <path d="M 250,100 C 300,110 360,140 400,170 C 330,130 280,118 254,116 Z"/>
      </g>
      <!-- Coconut clump -->
      <circle cx="246" cy="108" r="6" fill="#0a0a18"/>
      <circle cx="256" cy="112" r="5" fill="#0a0a18"/>
    </svg>

    <div class="content">
      <div class="eyebrow">07 &middot; Golden hour</div>
      <h1>Sunsets over <span class="ink">scope creep.</span></h1>
      <p class="lede">
        Mesh-gradient does the sky &mdash; warm, slow, primary tokens swapped for sunset hues
        via per-instance <code>--gl-wc-color-*</code> overrides. The ocean, palm, and shimmering
        reflection are just CSS over the top.
      </p>
    </div>
  </main>
  <script type="module" src="../src/gl-wc.js"></script>
</body>
</html>
