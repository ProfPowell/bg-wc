<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bauhaus &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #f3efe6;   /* paper */
      --color-foreground: #14110d;
      --color-primary: #1f49c4;      /* primary blue */
      --color-accent: #df2d23;       /* red */
      --color-warning: #f4b400;      /* yellow */
      --color-info: #14110d;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Space Grotesk', system-ui, sans-serif; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    bauhaus-scrim { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: linear-gradient(180deg, rgba(243,239,230,0.4) 0%, rgba(243,239,230,0.1) 40%, rgba(243,239,230,0.55) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Grotesk', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.7; }
    nav a:hover { opacity: 1; }

    bauhaus-panel { display: block; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 6; width: min(86vw, 760px);
      background: rgba(243,239,230,0.86); backdrop-filter: blur(2px); border: 3px solid var(--color-foreground); padding: clamp(28px, 5vw, 64px); }
    bauhaus-kicker { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 22px; }
    bauhaus-circle { display: inline-block; width: 16px; height: 16px; border-radius: 50%; background: var(--color-accent); }
    bauhaus-square { display: inline-block; width: 16px; height: 16px; background: var(--color-primary); }
    bauhaus-triangle { display: inline-block; width: 0; height: 0; border-left: 9px solid transparent; border-right: 9px solid transparent; border-bottom: 16px solid var(--color-warning); }
    h1 { font-family: 'Archivo Black', sans-serif; font-size: clamp(44px, 8vw, 104px); line-height: 0.92; letter-spacing: -0.02em; margin: 0; text-transform: uppercase; }
    bauhaus-word { display: inline; }
    bauhaus-word[data-tone="primary"] { color: var(--color-primary); }
    bauhaus-word[data-tone="accent"] { color: var(--color-accent); }
    bauhaus-panel p { margin: 22px 0 0; font-size: clamp(16px, 1.3vw, 20px); line-height: 1.55; max-width: 520px; color: #2a261f; }
    bauhaus-panel p code { font-family: ui-monospace, monospace; font-size: 0.84em; background: var(--color-foreground); color: var(--color-background); padding: 2px 7px; border-radius: 3px; }
    bauhaus-foot { display: flex; margin-top: 28px; gap: 18px; align-items: center; font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
    bauhaus-foot b { background: var(--color-foreground); color: var(--color-background); padding: 8px 16px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="bauhaus" data-background-intensity="0.8" data-background-density="0.5" data-background-speed="0.7">
    <bauhaus-scrim></bauhaus-scrim>

    <bauhaus-panel>
      <bauhaus-kicker><bauhaus-circle></bauhaus-circle><bauhaus-square></bauhaus-square><bauhaus-triangle></bauhaus-triangle> Staatliches Bauhaus &middot; est. 1919</bauhaus-kicker>
      <h1><bauhaus-word data-tone="primary">Form</bauhaus-word> follows<br><bauhaus-word data-tone="accent">function</bauhaus-word>.</h1>
      <p>
        Circle, square, triangle &mdash; primary forms at full saturation, sliding into
        place and recomposing a few cells at a time. <code>preset="bauhaus"</code>, the
        grid reads straight from your theme roles.
      </p>
      <bauhaus-foot><b>Foundation Course</b><span>geometry &middot; colour &middot; motion</span></bauhaus-foot>
    </bauhaus-panel>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
