<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arcade &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Audiowide&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #04000c;
      --color-foreground: #ff4fd8;
      --color-primary: #ff2bd6;
      --color-accent: #2bd4ff;
      --color-info: #ffe23a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; color: #fff; overflow: hidden; }
    body { font-family: 'Press Start 2P', monospace; min-height: 100vh; }

    .cab { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    bg-wc.tube { position: absolute; inset: 0; z-index: 0; }
    bg-wc.fx   { position: absolute; inset: 0; z-index: 1; }  /* fireballs over the tube */

    .vig { position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(4,0,12,0.75) 100%); }
    .scan { position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,0.28) 3px 4px);
      mix-blend-mode: multiply; }

    /* Extruded rainbow vector title — stacked colored shadows fake the
       layered-vector extrusion of the TEMPEST logo. */
    .title-wrap {
      position: absolute; inset: 0; z-index: 4;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    .vector-title {
      font-family: 'Audiowide', 'Press Start 2P', sans-serif;
      font-size: clamp(40px, 11vw, 150px);
      letter-spacing: 0.06em;
      line-height: 1;
      margin: 0;
      color: #fff;
      display: flex; gap: 0.06em;
      text-shadow:
        0 2px 0 #ff2b9d, 0 4px 0 #ff5a2b, 0 6px 0 #ffe23a,
        0 8px 0 #4fff5a, 0 10px 0 #2bd4ff, 0 12px 0 #6a5cff,
        0 14px 0 #b44bff, 0 18px 28px rgba(0,0,0,0.6);
    }
    .vector-title span {
      display: inline-block;
      animation: drop 0.7s cubic-bezier(.2,1.4,.4,1) backwards;
      animation-delay: calc(var(--i) * 0.12s);
    }
    @keyframes drop {
      0%   { transform: translateY(-120%) scaleY(1.4); opacity: 0; }
      60%  { opacity: 1; }
      80%  { transform: translateY(8%) scaleY(0.86); }
      100% { transform: translateY(0) scaleY(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .vector-title span { animation: none; }
    }

    .subtitle {
      margin-top: 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.4vw, 15px);
      letter-spacing: 0.18em;
      color: var(--color-accent);
      animation: blink 1.1s steps(2) infinite;
      animation-delay: 1s; animation-fill-mode: backwards;
    }
    @keyframes blink { 50% { opacity: 0.2; } }
    .copyright {
      margin-top: 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1vw, 11px);
      letter-spacing: 0.2em;
      color: var(--color-primary); opacity: 0.7;
    }

    /* Coin-op HUD */
    .hud {
      position: absolute; inset: 0; z-index: 6; pointer-events: none;
      font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 1.3vw, 14px);
      color: #fff; text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }
    .hud .tl { position: absolute; top: 26px; left: 28px; color: var(--color-info); line-height: 2; }
    .hud .tr { position: absolute; top: 26px; right: 28px; text-align: right; color: var(--color-accent); line-height: 2; }
    .hud .bc { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: var(--color-info); letter-spacing: 0.16em; }

    .nav { position: absolute; top: 26px; left: 50%; transform: translateX(-50%); z-index: 8; pointer-events: auto; }
    .nav a { color: var(--color-accent); text-decoration: none; font-size: 9px; letter-spacing: 0.18em; opacity: 0.75; }
    .nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main class="cab">
    <bg-wc class="tube" preset="tempest" intensity="0.7" density="0.5" speed="0.9"></bg-wc>
    <bg-wc class="fx" preset="fireworks" intensity="0.7" density="0.5" speed="1"
           style="--bg-wc-color-bg: transparent;"></bg-wc>

    <div class="vig"></div>

    <nav class="nav"><a href="./">&larr; Demos</a></nav>

    <div class="title-wrap">
      <h1 class="vector-title" aria-label="GL-WC">
        <span style="--i:0">G</span><span style="--i:1">L</span><span style="--i:2">&middot;</span><span style="--i:3">W</span><span style="--i:4">C</span>
      </h1>
      <div class="subtitle">INSERT COIN &middot; SHOOT FIREBALLS</div>
      <div class="copyright">&copy; MMXXVI PROFPOWELL</div>
    </div>

    <div class="hud">
      <div class="tl">SCORE<br>013440</div>
      <div class="tr">HI 113440 AAA<br>WAVE 05</div>
      <div class="bc">1 COIN 1 PLAY</div>
    </div>

    <div class="scan"></div>
  </main>
  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
