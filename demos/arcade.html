<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arcade &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Audiowide&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #04000c;
      --color-foreground: #ff4fd8;
      --color-primary: #ff2bd6;
      --color-accent: #2bd4ff;
      --color-info: #ffe23a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; color: #fff; overflow: hidden; }
    body { font-family: 'Press Start 2P', monospace; min-height: 100vh; }

    main { position: relative; display: grid; width: 100vw; height: 100vh; overflow: hidden; }
    cabinet-tube { display: block; grid-area: 1 / 1; z-index: 0; }
    cabinet-fx   { display: block; grid-area: 1 / 1; z-index: 1; }  /* fireballs over the tube */

    cabinet-vignette { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(4,0,12,0.75) 100%); }
    cabinet-scanlines { display: block; position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,0.28) 3px 4px);
      mix-blend-mode: multiply; }

    /* Extruded rainbow vector title — stacked colored shadows fake the
       layered-vector extrusion of the TEMPEST logo. */
    cabinet-title {
      display: flex; position: absolute; inset: 0; z-index: 4;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
    }
    cabinet-title h1 {
      font-family: 'Audiowide', 'Press Start 2P', sans-serif;
      font-size: clamp(40px, 11vw, 150px);
      letter-spacing: 0.06em;
      line-height: 1;
      margin: 0;
      color: #fff;
      display: flex; gap: 0.06em;
      text-shadow:
        0 2px 0 #ff2b9d, 0 4px 0 #ff5a2b, 0 6px 0 #ffe23a,
        0 8px 0 #4fff5a, 0 10px 0 #2bd4ff, 0 12px 0 #6a5cff,
        0 14px 0 #b44bff, 0 18px 28px rgba(0,0,0,0.6);
    }
    title-letter {
      display: inline-block;
      animation: drop 0.7s cubic-bezier(.2,1.4,.4,1) backwards;
      animation-delay: calc(var(--i) * 0.12s);
    }
    @keyframes drop {
      0%   { transform: translateY(-120%) scaleY(1.4); opacity: 0; }
      60%  { opacity: 1; }
      80%  { transform: translateY(8%) scaleY(0.86); }
      100% { transform: translateY(0) scaleY(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      title-letter { animation: none; }
    }

    cabinet-subtitle {
      display: block;
      margin-top: 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.4vw, 15px);
      letter-spacing: 0.18em;
      color: var(--color-accent);
      animation: blink 1.1s steps(2) infinite;
      animation-delay: 1s; animation-fill-mode: backwards;
    }
    @keyframes blink { 50% { opacity: 0.2; } }
    cabinet-copyright {
      display: block;
      margin-top: 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1vw, 11px);
      letter-spacing: 0.2em;
      color: var(--color-primary); opacity: 0.7;
    }

    /* Coin-op HUD */
    cabinet-hud {
      display: block; position: absolute; inset: 0; z-index: 6; pointer-events: none;
      font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 1.3vw, 14px);
      color: #fff; text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }
    hud-corner[data-pos="tl"] { display: block; position: absolute; top: 26px; left: 28px; color: var(--color-info); line-height: 2; }
    hud-corner[data-pos="tr"] { display: block; position: absolute; top: 26px; right: 28px; text-align: right; color: var(--color-accent); line-height: 2; }
    hud-corner[data-pos="bc"] { display: block; position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); color: var(--color-info); letter-spacing: 0.16em; }

    nav { position: absolute; top: 26px; left: 50%; transform: translateX(-50%); z-index: 8; pointer-events: auto; }
    nav a { color: var(--color-accent); text-decoration: none; font-size: 9px; letter-spacing: 0.18em; opacity: 0.75; }
    nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main>
    <cabinet-tube data-background="tempest" data-background-intensity="0.7" data-background-density="0.5" data-background-speed="0.9"></cabinet-tube>
    <cabinet-fx data-background="fireworks" data-background-intensity="0.7" data-background-density="0.5" data-background-speed="1"
                data-background-color-bg="transparent"></cabinet-fx>

    <cabinet-vignette></cabinet-vignette>

    <nav><a href="./" target="_top">&larr; Demos</a></nav>

    <cabinet-title>
      <h1 aria-label="BG-WC">
        <title-letter style="--i:0">B</title-letter><title-letter style="--i:1">G</title-letter><title-letter style="--i:2">&middot;</title-letter><title-letter style="--i:3">W</title-letter><title-letter style="--i:4">C</title-letter>
      </h1>
      <cabinet-subtitle>INSERT COIN &middot; SHOOT FIREBALLS</cabinet-subtitle>
      <cabinet-copyright>&copy; MMXXVI PROFPOWELL</cabinet-copyright>
    </cabinet-title>

    <cabinet-hud>
      <hud-corner data-pos="tl">SCORE<br>013440</hud-corner>
      <hud-corner data-pos="tr">HI 113440 AAA<br>WAVE 05</hud-corner>
      <hud-corner data-pos="bc">1 COIN 1 PLAY</hud-corner>
    </cabinet-hud>

    <cabinet-scanlines></cabinet-scanlines>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
