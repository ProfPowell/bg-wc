<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to Macintosh &mdash; bg-wc demos</title>
  <style>
    :root {
      --mac-bg: #ffffff;
      --mac-ink: #000000;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--mac-bg);
      color: var(--mac-ink);
      overflow: hidden;
      /* Chicago/Charcoal-era Mac never had a system sans on the web. ChicagoFLF
         and similar revivals aren't open-licensed. Settle for a sans that
         carries the same weight without lying about authenticity. */
      font-family: -apple-system, "Helvetica Neue", Helvetica, "Arial Narrow", sans-serif;
      font-weight: 700;
    }
    body { min-height: 100vh; }
    .stage { position: relative; width: 100vw; height: 100vh; }

    /* The desktop: System 7 stipple + drifting Mac windows. */
    bg-wc.desktop {
      position: absolute; inset: 0;
      display: block;
    }

    /* The "Welcome to Macintosh" dialog, centered like the boot greeting. */
    .welcome {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      background: #ffffff;
      border: 1px solid #000000;
      box-shadow: 1px 1px 0 #000000;
      padding: 0;
      min-width: 320px;
      max-width: 92vw;
      image-rendering: pixelated;
    }
    .welcome .title-bar {
      position: relative;
      height: 18px;
      border-bottom: 1px solid #000000;
      background:
        repeating-linear-gradient(
          to bottom,
          #000 0 1px,
          #fff 1px 3px
        );
      padding-left: 28px;
      padding-right: 28px;
    }
    .welcome .title-bar .close {
      position: absolute;
      left: 5px; top: 4px;
      width: 11px; height: 11px;
      background: #ffffff;
      border: 1px solid #000000;
    }
    .welcome .title-bar .title {
      position: absolute;
      left: 50%; top: 0; transform: translateX(-50%);
      background: #ffffff;
      padding: 0 8px;
      line-height: 18px;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .welcome .body {
      padding: 18px 28px 22px;
      text-align: center;
    }
    .welcome .happy-mac {
      width: 32px; height: 32px;
      display: block;
      margin: 0 auto 16px;
    }
    .welcome h1 {
      margin: 0 0 6px;
      font-size: 18px;
      letter-spacing: 0.01em;
    }
    .welcome p {
      margin: 0;
      font-size: 12px;
      font-weight: 400;
      color: #333;
      letter-spacing: 0.02em;
    }

    /* Menubar — System 7's perpetual fixture at the top. */
    .menubar {
      position: absolute;
      left: 0; right: 0; top: 0;
      z-index: 6;
      height: 20px;
      background: #ffffff;
      border-bottom: 1px solid #000000;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 12px;
      font-size: 12px;
    }
    .menubar .apple {
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .menubar .item { color: #000; font-weight: 700; }

    .corner-label {
      position: absolute;
      bottom: 18px; left: 18px; z-index: 6;
      font-size: 11px;
      font-weight: 400;
      color: #333;
      background: #ffffff;
      padding: 4px 8px;
      border: 1px solid #000000;
    }
    .corner-label a { color: inherit; text-decoration: none; }
    .corner-label a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="stage">
    <bg-wc class="desktop" preset="system7" density="0.55" intensity="0.5" speed="0.2"></bg-wc>

    <div class="menubar" aria-hidden="true">
      <span class="apple">&#63743;</span>
      <span class="item">File</span>
      <span class="item">Edit</span>
      <span class="item">View</span>
      <span class="item">Label</span>
      <span class="item">Special</span>
    </div>

    <div class="welcome" role="dialog" aria-labelledby="welcome-title">
      <div class="title-bar">
        <span class="close" aria-hidden="true"></span>
        <span class="title">Macintosh</span>
      </div>
      <div class="body">
        <svg class="happy-mac" viewBox="0 0 32 32" aria-hidden="true">
          <!-- Tiny pixel happy-mac homage. Not a 1:1 reproduction. -->
          <rect x="4" y="3" width="24" height="26" fill="#fff" stroke="#000" stroke-width="1"/>
          <rect x="6" y="5" width="20" height="14" fill="#fff" stroke="#000" stroke-width="1"/>
          <!-- eyes -->
          <rect x="10" y="9" width="2" height="2" fill="#000"/>
          <rect x="20" y="9" width="2" height="2" fill="#000"/>
          <!-- smile -->
          <path d="M 11 13 L 13 15 L 19 15 L 21 13" stroke="#000" stroke-width="1" fill="none"/>
          <!-- floppy slot -->
          <rect x="9" y="22" width="14" height="2" fill="#000"/>
        </svg>
        <h1 id="welcome-title">Welcome to Macintosh.</h1>
        <p>preset = system7</p>
      </div>
    </div>

    <div class="corner-label">
      <a href="./" target="_top">&larr; Demos</a>
    </div>
  </main>
  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
