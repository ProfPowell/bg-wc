<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kintsugi &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #14110e;   /* lacquer */
      --color-foreground: #efe6d2;
      --color-primary: #2e2722;      /* warm stone */
      --color-accent: #d4a437;       /* gold */
      --color-warning: #e7c468;      /* bright gold */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; }
    main { position: relative; width: 100vw; height: 100vh; }
    kintsugi-vignette { display: block; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 64% 60% at 50% 50%, transparent 30%, rgba(20,17,14,0.9) 100%); }

    nav { position: absolute; top: 24px; left: 32px; z-index: 12; font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.2em; }
    nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.7; }
    nav a:hover { opacity: 1; }

    kintsugi-content { display: block; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); z-index: 6; text-align: center; padding: 0 clamp(20px, 4vw, 80px); }
    kintsugi-eyebrow { display: block; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.24em; color: var(--color-accent); opacity: 0.92; margin-bottom: 18px; text-transform: lowercase; }
    h1 { font-weight: 500; font-size: clamp(64px, 13vw, 220px); letter-spacing: 0.06em; line-height: 0.95; margin: 0; text-transform: uppercase;
      background: linear-gradient(180deg, #fff 0%, var(--color-warning) 55%, var(--color-accent) 115%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 6px 30px rgba(212,164,55,0.35)); }
    kintsugi-content p { max-width: 560px; margin: 22px auto 0; font-size: clamp(16px, 1.3vw, 20px); line-height: 1.55; color: rgba(239,230,210,0.82); }
    kintsugi-content p code { font-family: ui-monospace, monospace; font-size: 0.85em; background: rgba(255,255,255,0.08); padding: 2px 7px; border-radius: 4px; }

    kintsugi-telemetry { display: flex; position: absolute; bottom: 28px; left: 0; right: 0; z-index: 6; justify-content: space-between; padding: 0 clamp(28px, 6vw, 80px);
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--color-accent); opacity: 0.82; flex-wrap: wrap; gap: 12px; }
    kintsugi-stat { display: block; }
    kintsugi-stat span { color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>

  <main data-background="kintsugi" data-background-intensity="0.8" data-background-density="0.55" data-background-speed="0.6">
    <kintsugi-vignette></kintsugi-vignette>

    <kintsugi-content>
      <kintsugi-eyebrow>// golden repair &middot; canvas2d</kintsugi-eyebrow>
      <h1>Kintsugi</h1>
      <p>
        Cracks grow across the dark slab and fill with gold &mdash; the repair made
        the ornament. <code>preset="kintsugi"</code> &mdash; veins branch, shimmer,
        and reseed in a slow cycle.
      </p>
    </kintsugi-content>

    <kintsugi-telemetry>
      <kintsugi-stat><span>preset</span>kintsugi</kintsugi-stat>
      <kintsugi-stat><span>render</span>canvas2d</kintsugi-stat>
      <kintsugi-stat><span>cycle</span>26s</kintsugi-stat>
      <kintsugi-stat><span>palette</span>theme</kintsugi-stat>
    </kintsugi-telemetry>
  </main>

  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
