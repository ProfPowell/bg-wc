<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supergraphics &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3eddf;
      --ink: #1a1a1a;
      --red: #e63946;
      --yel: #f4d03f;
      --blu: #1e3a8a;
      --grn: #2a7c5b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); overflow: hidden; }
    body { font-family: 'Space Mono', ui-monospace, monospace; min-height: 100vh; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* The supergraphic itself — giant flat shapes wrapping the surface. */
    svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      display: block;
    }

    /* Halftone screen, painted on top via multiply blend so it grits up the flats. */
    halftone-screen[data-background] {
      display: block;
      position: absolute; inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.10;
      pointer-events: none;
    }

    /* Tiny typographic labels — supergraphics are shape-led, not type-led. */
    body > nav, poster-label {
      display: block;
      position: absolute; z-index: 6;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.6;
      color: var(--ink);
    }
    body > nav { top: 28px; left: 36px; }
    poster-label[data-corner="tr"] { top: 28px; right: 36px; text-align: right; }
    poster-label[data-corner="bl"] { bottom: 28px; left: 36px; }
    poster-label[data-corner="br"] { bottom: 28px; right: 36px; text-align: right; }
    poster-title {
      display: block;
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      letter-spacing: -0.01em;
      text-transform: none;
      margin-bottom: 4px;
    }
    body > nav a { color: inherit; text-decoration: none; opacity: 0.7; }
    body > nav a:hover { opacity: 1; }

    /* SUPERGRAPHICS marquee — replaces the WORM. The bg-wc marquee preset
       provides the motion; mix-blend-mode lets the black ink darken the
       colored bands behind it the same way the WORM used to. */
    marquee-band[data-background] {
      display: block;
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 28vh;
      z-index: 5;
      mix-blend-mode: multiply;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <nav><a href="./" target="_top">&larr; Demos</a></nav>
  <main>
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <!-- BG -->
      <rect width="1600" height="900" fill="#f3eddf"/>
      <!-- HUGE red half-disc, bottom-left -->
      <circle cx="240" cy="1080" r="820" fill="#e63946"/>
      <!-- Yellow vertical column (carries the WORM text via overlay) -->
      <rect x="800" y="0" width="240" height="900" fill="#f4d03f"/>
      <!-- Cobalt chevron-stripe -->
      <polygon points="1080,0 1340,0 1200,450 1340,900 1080,900 1220,450" fill="#1e3a8a"/>
      <!-- Green far-right band -->
      <rect x="1440" y="0" width="160" height="900" fill="#2a7c5b"/>
      <!-- Yellow half-disc on the green column -->
      <circle cx="1520" cy="180" r="64" fill="#f4d03f"/>
      <!-- Cream "moon" cut into the red -->
      <circle cx="160" cy="200" r="56" fill="#f3eddf"/>
      <!-- Black baseline + tick marks -->
      <rect y="784" width="1600" height="4" fill="#1a1a1a"/>
      <rect y="788" width="1600" height="16" fill="rgba(26,26,26,0.06)"/>
      <rect x="120" y="776" width="3" height="16" fill="#1a1a1a"/>
      <rect x="380" y="776" width="3" height="16" fill="#1a1a1a"/>
      <rect x="640" y="776" width="3" height="16" fill="#1a1a1a"/>
      <!-- Small black accent dot in lower-left -->
      <circle cx="420" cy="700" r="14" fill="#1a1a1a"/>
    </svg>

    <marquee-band data-background="marquee" data-background-palette="mono"
           data-background-text="SUPERGRAPHICS  ·  SUPERGRAPHICS  ·  "
           data-background-speed="0.5" data-background-intensity="0.6"
           data-background-color-fg="#1a1a1a"></marquee-band>

    <halftone-screen data-background="noise" data-background-intensity="0.7" data-background-density="0.85" data-background-speed="0.25"
           data-background-color-fg="#000000" data-background-color-bg="#ffffff"></halftone-screen>

    <poster-label data-corner="tr">
      <poster-title>01 / Supergraphics</poster-title>
      Environmental graphics<br>
      VB &times; integration layer
    </poster-label>
    <poster-label data-corner="bl">
      bg-wc &times; marquee &middot; halftone overlay<br>
      mix-blend-mode: multiply
    </poster-label>
    <poster-label data-corner="br">
      Vol. 01 &middot; Issue 09<br>
      MMXXVI
    </poster-label>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
