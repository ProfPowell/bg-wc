<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sea Ranch &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f3eddf;
      --ink:   #1a1a1a;
      --red:   #e63946;
      --gold:  #d4a843;
      --cobalt:#1e3a8a;

      /* Sea Ranch palette piped into bg-wc theme tokens. */
      --color-background: #f3eddf;
      --color-text:       #1a1a1a;
      --color-foreground: #1a1a1a;
      --color-primary:    #e63946;
      --color-accent:     #1a1a1a;
      --color-info:       #d4a843;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
      font-family: 'Space Mono', ui-monospace, monospace;
    }
    body { min-height: 100vh; }

    .stage { position: relative; width: 100vw; height: 100vh; }

    /* The supergraphic itself — animated bands courtesy of the preset. */
    bg-wc.bands {
      position: absolute; inset: 0;
      display: block;
    }

    /* Halftone noise overlay — gives the painted flats a screen-printed grit. */
    bg-wc.halftone {
      position: absolute; inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.09;
      pointer-events: none;
    }

    /* Editorial cards — the bg moves dramatically behind them, so each card
       gets a solid cream background + thin ink border so the type stays
       legible no matter what color sweeps past. */
    .label-tl, .label-tr, .label-bl, .label-br {
      position: absolute; z-index: 5;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--ink);
      padding: 14px 18px;
      box-shadow: 4px 4px 0 var(--ink);
    }
    .label-tl { top: 28px; left: 36px; }
    .label-tr { top: 28px; right: 36px; text-align: right; }
    .label-bl { bottom: 28px; left: 36px; }
    .label-br { bottom: 28px; right: 36px; text-align: right; }
    .label-tr .big {
      display: block;
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      letter-spacing: -0.01em;
      text-transform: none;
      margin-bottom: 4px;
    }
    .label-tl { padding: 6px 12px; box-shadow: 3px 3px 0 var(--ink); }
    .label-tl a { color: inherit; text-decoration: none; }
    .label-tl a:hover { color: var(--red); }
  </style>
</head>
<body>
  <main class="stage">
    <bg-wc class="bands" preset="supergraphics" density="0.6" intensity="0.8" speed="0.4"></bg-wc>

    <bg-wc class="halftone" preset="noise" intensity="0.7" density="0.85" speed="0.25"
           style="--bg-wc-color-fg:#000000; --bg-wc-color-bg:#ffffff;"></bg-wc>

    <div class="label-tl">
      <a href="./" target="_top">&larr; Demos</a>
    </div>
    <div class="label-tr">
      <span class="big">Sea Ranch</span>
      Environmental graphics<br>
      after Stauffacher Solomon
    </div>
    <div class="label-bl">
      bg-wc &times; supergraphics<br>
      animated mural-scale bands
    </div>
    <div class="label-br">
      Vol. 02 &middot; Issue 01<br>
      MMXXVI
    </div>
  </main>
  <script type="module" src="../src/bg-wc.js"></script>
</body>
</html>
