<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sea Ranch &mdash; bg-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f3eddf;
      --ink:   #1a1a1a;
      --red:   #e63946;
      --gold:  #d4a843;
      --cobalt:#1e3a8a;

      /* Sea Ranch palette piped into bg-wc theme tokens. */
      --color-background: #f3eddf;
      --color-text:       #1a1a1a;
      --color-foreground: #1a1a1a;
      --color-primary:    #e63946;
      --color-accent:     #1a1a1a;
      --color-info:       #d4a843;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
      font-family: 'Space Mono', ui-monospace, monospace;
    }
    body { min-height: 100vh; }

    main { position: relative; width: 100vw; height: 100vh; }

    /* The supergraphic itself — animated bands courtesy of the preset. */
    sea-mural {
      display: block; position: absolute; inset: 0;
    }

    /* Halftone noise overlay — gives the painted flats a screen-printed grit. */
    sea-halftone {
      display: block; position: absolute; inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.09;
      pointer-events: none;
    }

    /* Editorial cards — the bg moves dramatically behind them, so each card
       gets a solid cream background + thin ink border so the type stays
       legible no matter what color sweeps past. */
    nav, sea-title, sea-caption, sea-issue {
      display: block;
      position: absolute; z-index: 5;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--ink);
      padding: 14px 18px;
      box-shadow: 4px 4px 0 var(--ink);
    }
    nav { top: 28px; left: 36px; }
    sea-title { top: 28px; right: 36px; text-align: right; }
    sea-caption { bottom: 28px; left: 36px; }
    sea-issue { bottom: 28px; right: 36px; text-align: right; }
    sea-title strong {
      display: block;
      font-family: 'Archivo Black', sans-serif;
      font-size: 32px;
      letter-spacing: -0.01em;
      text-transform: none;
      margin-bottom: 4px;
    }
    nav { padding: 6px 12px; box-shadow: 3px 3px 0 var(--ink); }
    nav a { color: inherit; text-decoration: none; }
    nav a:hover { color: var(--red); }
  </style>
</head>
<body>
  <main>
    <sea-mural data-background="supergraphics" data-background-density="0.6" data-background-intensity="0.8" data-background-speed="0.4"></sea-mural>

    <sea-halftone data-background="noise" data-background-intensity="0.7" data-background-density="0.85" data-background-speed="0.25"
                  data-background-color-fg="#000000" data-background-color-bg="#ffffff"></sea-halftone>

    <nav>
      <a href="./" target="_top">&larr; Demos</a>
    </nav>
    <sea-title>
      <strong>Sea Ranch</strong>
      Environmental graphics<br>
      after Stauffacher Solomon
    </sea-title>
    <sea-caption>
      bg-wc &times; supergraphics<br>
      animated mural-scale bands
    </sea-caption>
    <sea-issue>
      Vol. 02 &middot; Issue 01<br>
      MMXXVI
    </sea-issue>
  </main>
  <script type="module">
    import 'vanilla-breeze/css'; /* layers + layout attributes; no theme JS — the palette is pinned */
    import '../src/data-background.js';
  </script>
</body>
</html>
