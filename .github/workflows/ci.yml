name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Custom-elements manifest is up to date
        run: npm run cem:check

      - name: Node unit tests (test/*.mjs)
        run: npm run test:node

      - name: Build library
        run: npm run build

      - name: Pack-install smoke (subpath exports resolve from the tarball)
        run: node scripts/pack-smoke.mjs

      - name: Build site
        run: npm run build:site

      - name: Verify built site registers bg-wc (tree-shaking guard)
        run: npm run verify:site

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm test

  # Per-preset visual baselines run in the pinned Playwright container so pixels
  # match the committed baselines exactly (generated with the same image via
  # scripts/update-visual-baselines.sh). Kept out of the matrix job above, whose
  # ubuntu-latest renderer would not match the baselines.
  visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      options: --ipc=host
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Visual regression
        run: npm run test:visual
