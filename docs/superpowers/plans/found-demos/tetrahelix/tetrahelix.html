<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<link rel="stylesheet" href="tetrahelix.css">
</head>
<body>
<label class="change">
	Tap to change...
	<input type="checkbox">
</label>

<div class="scene">
	<div class="m">
		<div class="tri A" style="--i: 4; --l: 1;">
			<div class="tri B a3" style="--i: 3; --l: 1;">
				<div class="tri B a2" style="--i: 2; --l: 1;">
					<div class="tri B a1" style="--i: 2; --l: 0;"></div>
					<div class="tri C a3" style="--i: 1; --l: 1;">
						<div class="tri B a2" style="--i: 0; --l: 1;">
							<div class="tri B a1" style="--i: 0; --l: 0;"></div>
						</div>
						<div class="tri C a1" style="--i: 1; --l: 2;"></div>
					</div>
				</div>
				<div class="tri C a1" style="--i: 3; --l: 2;"></div>
			</div>
			<div class="tri C a2" style="--i: 5; --l: 1;">
				<div class="tri B a1" style="--i: 5; --l: 2;"></div>
				<div class="tri C a3" style="--i: 6; --l: 1;">
					<div class="tri B a2" style="--i: 7; --l: 1;">
						<div class="tri B a1" style="--i: 7; --l: 2;"></div>
						<div class="tri C a3" style="--i: 8; --l: 1;">
							<div class="tri B a2" style="--i: 9; --l: 1;">
								<div class="tri B a1" style="--i: 9; --l: 2;"></div>
							</div>
							<div class="tri C a1" style="--i: 8; --l: 0;"></div>
						</div>
					</div>
					<div class="tri C a1" style="--i: 6; --l: 0;"></div>
				</div>
			</div>
			<div class="tri D a1" style="--i: 4; --l: 0;"></div>
		</div>
	</div>
</div>
</body>
</html>
