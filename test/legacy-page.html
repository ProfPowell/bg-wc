<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bg-wc legacy-removed harness</title>
    <style>
      bg-wc,
      gl-wc {
        display: block;
        width: 240px;
        height: 160px;
      }
    </style>
  </head>
  <body>
    <gl-wc id="legacy" preset="mesh-gradient"></gl-wc>
    <bg-wc id="canonical" preset="mesh-gradient"></bg-wc>
    <section id="binder-legacy" data-bg="dither" style="width: 240px; height: 160px"></section>
    <section
      id="binder-canonical"
      data-background="dither"
      style="width: 240px; height: 160px"
    ></section>
    <script type="module" src="../src/data-background.js"></script>
  </body>
</html>
