<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trading Desk &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #05080f;
      --color-foreground: #d7e6ff;
      --color-primary: #26d07c;
      --color-accent: #ff4d6d;
      --color-info: #5b8eff;
      --color-success: #26d07c;
      --color-error: #ff4d6d;
      --panel: rgba(10,16,28,0.72);
      --border: rgba(120,160,220,0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #03050a; color: var(--color-foreground); overflow: hidden; }
    body { font-family: 'IBM Plex Mono', ui-monospace, monospace; min-height: 100vh; }

    .desk { position: relative; width: 100vw; height: 100vh; }
    gl-wc.tape { position: absolute; inset: 0; z-index: 0; opacity: 0.9; }

    .topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 4; height: 44px;
      display: flex; align-items: center; gap: 18px; padding: 0 20px;
      background: linear-gradient(180deg, rgba(5,8,15,0.95), rgba(5,8,15,0.5));
      border-bottom: 1px solid var(--border);
      font-family: Inter, sans-serif; font-weight: 700; letter-spacing: 0.04em;
    }
    .topbar .live { color: var(--color-primary); display: flex; align-items: center; gap: 8px; }
    .topbar .live .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-primary); box-shadow: 0 0 8px var(--color-primary); animation: blink 1.2s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    .topbar .idx { font-family: 'IBM Plex Mono', monospace; font-size: 13px; opacity: 0.85; }
    .topbar .idx b.up { color: var(--color-primary); } .topbar .idx b.dn { color: var(--color-accent); }
    .topbar .clock { margin-left: auto; font-family: 'IBM Plex Mono', monospace; opacity: 0.8; }

    .panel {
      position: absolute; z-index: 4; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; backdrop-filter: blur(8px);
      box-shadow: 0 14px 40px -16px rgba(0,0,0,0.7);
    }
    .panel .hd { font-family: Inter, sans-serif; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(215,230,255,0.7); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .panel gl-wc { display: block; width: 100%; height: calc(100% - 31px); }

    .chart { left: 24px; bottom: 24px; width: min(380px, 42vw); height: 230px; }
    .map   { right: 24px; bottom: 24px; width: min(380px, 42vw); height: 230px; }

    .nav { position: absolute; top: 56px; left: 22px; z-index: 6; }
    .nav a { color: var(--color-info); text-decoration: none; font-size: 12px; letter-spacing: 0.12em; opacity: 0.8; }
    .nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <main class="desk">
    <!-- full-bleed scrolling tape -->
    <gl-wc class="tape" preset="trades" density="0.65" speed="1.1"></gl-wc>

    <div class="topbar">
      <span class="live"><span class="dot"></span>MARKETS LIVE</span>
      <span class="idx">S&amp;P <b class="up">+0.62%</b></span>
      <span class="idx">NDX <b class="up">+1.04%</b></span>
      <span class="idx">DJI <b class="dn">&minus;0.18%</b></span>
      <span class="idx">VIX <b class="dn">13.7</b></span>
      <span class="clock" id="clock">09:41:00 ET</span>
    </div>

    <nav class="nav"><a href="./">&larr; demos</a></nav>

    <section class="panel chart">
      <div class="hd">Portfolio &middot; intraday</div>
      <gl-wc preset="dashboard" intensity="0.7" speed="1"></gl-wc>
    </section>
    <section class="panel map">
      <div class="hd">Order flow &middot; global</div>
      <gl-wc preset="vectormap" density="0.6" speed="0.7"></gl-wc>
    </section>
  </main>
  <script type="module" src="../../src/gl-wc.js"></script>
  <script>
    // ticking clock for flavor
    const el = document.getElementById('clock');
    let s = 9 * 3600 + 41 * 60;
    setInterval(() => {
      s++; const hh = String((s / 3600 | 0) % 24).padStart(2, '0');
      const mm = String((s / 60 | 0) % 60).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      el.textContent = `${hh}:${mm}:${ss} ET`;
    }, 1000);
  </script>
</body>
</html>
