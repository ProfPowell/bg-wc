<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8-bit Retro &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #0a0a18;
      --color-foreground: #00ff88;
      --color-primary: #ff00aa;
      --color-accent: #00ddff;
      --color-info: #ffee00;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); }
    body { font-family: 'VT323', 'Courier New', monospace; min-height: 100vh; overflow: hidden; }

    .stage { position: relative; width: 100vw; height: 100vh; }

    /* Background layer: chunky dither, rendered at low pixel-ratio for that authentically blocky look. */
    gl-wc.bg { position: absolute; inset: 0; }
    gl-wc.bg::part(canvas) { image-rendering: pixelated; image-rendering: crisp-edges; }

    /* CRT effects */
    .scanlines {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.22) 3px,
        rgba(0,0,0,0.22) 4px
      );
      mix-blend-mode: multiply;
    }
    .vignette {
      position: absolute; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
    }
    .flicker {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: rgba(255,255,255,0.02);
      animation: flicker 0.13s steps(2) infinite;
    }
    @keyframes flicker { 50% { background: rgba(0,0,0,0.03); } }

    .content {
      position: absolute; inset: 0; z-index: 6;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: clamp(20px, 3vw, 36px); padding: 6vh 6vw;
    }
    .title {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: clamp(32px, 8vw, 96px);
      color: var(--color-info);
      text-shadow:
        4px 4px 0 var(--color-primary),
        8px 8px 0 var(--color-accent),
        12px 12px 0 rgba(0,0,0,0.4);
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
    }
    .subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(10px, 1.4vw, 14px);
      color: var(--color-foreground);
      letter-spacing: 0.1em;
      opacity: 0.85;
    }
    .scoreboard {
      font-size: clamp(16px, 2vw, 22px);
      display: grid; grid-template-columns: auto auto; gap: 6px 30px;
      color: var(--color-accent);
      font-family: 'VT323', monospace;
    }
    .scoreboard .v { color: var(--color-info); }
    .press {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(11px, 1.5vw, 16px);
      color: var(--color-foreground);
      animation: blink 1s steps(2) infinite;
      letter-spacing: 0.15em;
    }
    @keyframes blink { 50% { opacity: 0.15; } }

    .nav { position: absolute; top: 16px; left: 20px; z-index: 10; font-family: 'Press Start 2P', monospace; font-size: 9px; }
    .nav a { color: var(--color-foreground); text-decoration: none; opacity: 0.65; letter-spacing: 0.15em; }
    .nav a:hover { opacity: 1; }
  </style>
</head>
<body>
  <nav class="nav"><a href="./">&lt; DEMOS</a></nav>
  <main class="stage">
    <gl-wc class="bg" preset="dither" intensity="0.95" density="0" speed="0.35" pixel-ratio="0.35"></gl-wc>
    <div class="vignette"></div>
    <div class="content">
      <h1 class="title">GL-WC</h1>
      <p class="subtitle">A WEB COMPONENT FROM 198X</p>
      <div class="scoreboard">
        <span>HI-SCORE</span><span class="v">008-BIT</span>
        <span>WORLD</span><span class="v">09 / 09</span>
        <span>RENDER</span><span class="v">WEBGL</span>
      </div>
      <p class="press">&gt;&gt;&gt; PRESS START &lt;&lt;&lt;</p>
    </div>
    <div class="scanlines"></div>
    <div class="flicker"></div>
  </main>
  <script type="module" src="../../src/gl-wc.js"></script>
</body>
</html>
