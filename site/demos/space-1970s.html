<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alpha &mdash; gl-wc demos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #06060e;
      --color-foreground: #f3e8c0;
      --color-primary: #ff6f3c;     /* NASA worm orange */
      --color-accent: #f3c969;       /* warm cream */
      --color-info: #7a4dff;         /* dim cosmic purple */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--color-background); color: var(--color-foreground); overflow: hidden; }
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .stage { position: relative; width: 100vw; height: 100vh; }

    /* Lava preset doing nebula duty */
    gl-wc.nebula { position: absolute; inset: 0; opacity: 0.72; }
    /* Stars preset on top, sparse + slow */
    gl-wc.stars { position: absolute; inset: 0; z-index: 2; }

    /* Earth/moon silhouette in lower-right */
    .planet {
      position: absolute; right: -8vw; bottom: -22vw;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%,
          rgba(243,232,192,0.95) 0%,
          rgba(255,111,60,0.45) 35%,
          rgba(122,77,255,0.25) 60%,
          rgba(6,6,14,0) 75%);
      filter: blur(1px);
      z-index: 3;
      pointer-events: none;
    }
    .planet::before {
      content: ""; position: absolute; inset: 8%;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 30%, #f3c969, #ff6f3c 45%, #4a2a18 80%, #06060e 100%);
      box-shadow: inset -40px -40px 80px rgba(0,0,0,0.45);
    }

    /* Concentric ring markers — instrumentation */
    .rings {
      position: absolute; right: 36px; top: 36px;
      width: 220px; height: 220px;
      z-index: 4; opacity: 0.85;
    }
    .rings svg { width: 100%; height: 100%; }

    .content {
      position: absolute; inset: 0; z-index: 6;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 clamp(28px, 6vw, 96px);
    }
    .meta {
      font-family: 'Major Mono Display', ui-monospace, monospace;
      font-size: 13px; letter-spacing: 0.18em;
      color: var(--color-primary);
      margin-bottom: 26px;
      text-transform: lowercase;
    }
    .meta .dot { color: var(--color-foreground); }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(46px, 8.5vw, 132px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--color-foreground);
      text-transform: lowercase;
      font-weight: 400;
    }
    h1 .o {
      color: var(--color-primary);
      font-weight: 400;
    }
    .lede {
      font-family: Inter, sans-serif;
      font-size: clamp(15px, 1.1vw, 18px);
      line-height: 1.6;
      max-width: 480px;
      opacity: 0.85;
      margin: 32px 0 0;
    }
    .lede code { font-family: 'Major Mono Display', monospace; color: var(--color-primary); }

    .telemetry {
      position: absolute; bottom: 32px; left: clamp(28px, 6vw, 96px); right: clamp(28px, 6vw, 96px);
      z-index: 7;
      display: flex; gap: 28px; flex-wrap: wrap;
      font-family: 'Major Mono Display', monospace;
      font-size: 11px; letter-spacing: 0.16em;
      color: var(--color-accent);
    }
    .telemetry > div span { color: var(--color-foreground); opacity: 0.5; padding-right: 6px; }

    .nav {
      position: absolute; top: 28px; left: 32px; z-index: 12;
      font-family: 'Major Mono Display', monospace; font-size: 12px;
      letter-spacing: 0.2em;
    }
    .nav a { color: var(--color-primary); text-decoration: none; opacity: 0.85; }
    .nav a:hover { opacity: 1; }

    /* Vignette */
    .vig {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(ellipse at 30% 50%, transparent 0%, rgba(6,6,14,0.6) 95%);
    }
  </style>
</head>
<body>
  <nav class="nav"><a href="./">&larr; demos</a></nav>
  <main class="stage">
    <gl-wc class="nebula" preset="lava" intensity="0.55" density="0.4" speed="0.35"></gl-wc>
    <gl-wc class="stars" preset="stars" intensity="0.55" density="0.35" speed="0.3"
           style="--gl-wc-color-bg: transparent;"></gl-wc>
    <div class="planet"></div>
    <div class="vig"></div>

    <div class="rings">
      <svg viewBox="0 0 200 200">
        <g fill="none" stroke="#f3c969" stroke-width="1" opacity="0.8">
          <circle cx="100" cy="100" r="92"/>
          <circle cx="100" cy="100" r="72"/>
          <circle cx="100" cy="100" r="52"/>
          <circle cx="100" cy="100" r="32"/>
          <line x1="100" y1="8" x2="100" y2="22"/>
          <line x1="100" y1="178" x2="100" y2="192"/>
          <line x1="8" y1="100" x2="22" y2="100"/>
          <line x1="178" y1="100" x2="192" y2="100"/>
        </g>
        <circle cx="100" cy="100" r="3" fill="#ff6f3c"/>
        <text x="100" y="14" text-anchor="middle" font-family="Major Mono Display, monospace" font-size="9" fill="#f3c969" opacity="0.85">N</text>
        <text x="100" y="194" text-anchor="middle" font-family="Major Mono Display, monospace" font-size="9" fill="#f3c969" opacity="0.85">S</text>
      </svg>
    </div>

    <div class="content">
      <div class="meta">a<span class="dot">.</span>l<span class="dot">.</span>p<span class="dot">.</span>h<span class="dot">.</span>a &nbsp;&middot;&nbsp; transmission 0<span class="dot">.</span>7<span class="dot">.</span>9</div>
      <h1>signal fr<span class="o">o</span>m<br>the <span class="o">o</span>uter dark.</h1>
      <p class="lede">
        Lava metaballs do the nebula. Stars drift on top. The whole composition runs
        from two <code>&lt;gl-wc&gt;</code> instances, both off-screen-paused, both motion-aware.
      </p>
    </div>

    <div class="telemetry">
      <div><span>vec</span>-04.207 / +12.881</div>
      <div><span>vel</span>4.21 km/s</div>
      <div><span>pwr</span>nominal</div>
      <div><span>ren</span>webgl &middot; canvas2d</div>
      <div><span>raf</span>idle-paused</div>
    </div>
  </main>
  <script type="module" src="../../src/gl-wc.js"></script>
</body>
</html>
